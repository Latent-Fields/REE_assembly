<!doctype html>
<!-- BRAIN_MAP_VERSION: 2026-05-19.1 -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>REE Brain Map</title>
<style>
  :root {
    --bg-0: #0d1117;
    --bg-1: #161b22;
    --bg-2: #1c2128;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --tier-expressed: #2ea043;
    --tier-claimed: #d29922;
    --tier-frontier: #a371f7;
    --tier-absent: #484f58;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-0);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 13px;
    height: 100%;
  }
  header.bar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 10px 16px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  header.bar h1 { font-size: 14px; margin: 0; font-weight: 600; }
  header.bar .gen { color: var(--muted); font-size: 11px; }
  header.bar .links { margin-left: auto; display: flex; gap: 8px; }
  header.bar .links a {
    color: var(--muted); text-decoration: none; font-size: 12px;
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px;
  }
  header.bar .links a:hover { color: var(--text); background: var(--bg-2); }
  .disclaimer {
    padding: 8px 16px; background: #1a2332; border-bottom: 1px solid var(--border);
    color: var(--muted); font-size: 12px;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    height: calc(100vh - 88px);
    min-height: 400px;
  }
  .canvas-wrap {
    position: relative;
    overflow: hidden;
    background: var(--bg-0);
    border-right: 1px solid var(--border);
  }
  .toolbar {
    position: absolute; top: 8px; left: 8px; z-index: 10;
    display: flex; flex-wrap: wrap; gap: 6px; max-width: 90%;
  }
  .toolbar label, .toolbar button {
    font-size: 11px; padding: 4px 8px;
    background: var(--bg-1); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); cursor: pointer;
  }
  .toolbar label { cursor: pointer; user-select: none; }
  .toolbar button:hover, .toolbar label:hover { background: var(--bg-2); }
  .toolbar .mode-on { border-color: var(--accent); color: var(--accent); }
  #svgHost {
    width: 100%; height: 100%;
    cursor: grab;
    display: flex; align-items: center; justify-content: center;
  }
  #svgHost:active { cursor: grabbing; }
  #svgHost svg { max-width: 100%; max-height: 100%; }
  #svgHost .brain-region, #svgHost .eng-node {
    stroke: #30363d;
    stroke-width: 1.5;
    cursor: pointer;
    transition: fill 0.2s, stroke 0.2s, opacity 0.2s;
  }
  #svgHost .brain-region:hover, #svgHost .eng-node:hover {
    stroke: var(--accent);
    stroke-width: 2;
  }
  #svgHost .brain-region.selected, #svgHost .eng-node.selected {
    stroke: #f0f6fc;
    stroke-width: 2.5;
  }
  #svgHost .ghost.hidden-layer { opacity: 0.12; pointer-events: none; }
  .sidebar {
    overflow-y: auto;
    padding: 14px 16px;
    background: var(--bg-1);
  }
  .sidebar h2 { font-size: 14px; margin: 0 0 8px; }
  .sidebar .meta { color: var(--muted); font-size: 11px; margin-bottom: 12px; }
  .badge {
    display: inline-block; font-size: 10px; padding: 2px 6px;
    border-radius: 4px; margin-right: 4px; text-transform: uppercase;
  }
  .badge-expressed { background: #1a3d2a; color: var(--tier-expressed); }
  .badge-claimed { background: #3d2e1a; color: var(--tier-claimed); }
  .badge-frontier { background: #2e1a3d; color: var(--tier-frontier); }
  .badge-absent { background: #21262d; color: var(--tier-absent); }
  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    margin: 10px 0; font-size: 11px;
  }
  .stat-grid div { background: var(--bg-2); padding: 6px 8px; border-radius: 4px; }
  .stat-grid span { color: var(--muted); display: block; font-size: 10px; }
  .claim-list { list-style: none; padding: 0; margin: 8px 0; }
  .claim-list li {
    padding: 4px 0; border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .claim-list a { color: var(--accent); text-decoration: none; }
  .claim-list a:hover { text-decoration: underline; }
  .empty { color: var(--muted); font-style: italic; padding: 24px 0; }
  .legend {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px;
    font-size: 10px; color: var(--muted);
  }
  .legend i {
    display: inline-block; width: 12px; height: 12px;
    border-radius: 2px; margin-right: 4px; vertical-align: middle;
  }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; grid-template-rows: 1fr 280px; }
    .canvas-wrap { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
<header class="bar">
  <h1>REE Brain Map</h1>
  <span class="gen" id="genTime">loading...</span>
  <div class="links">
    <a href="/explorer.html">Explorer</a>
    <a href="/closure">Closure</a>
  </div>
</header>
<div class="disclaimer" id="disclaimer">
  Functional analogy only -- not biological homology. Colors show REE claim density,
  substrate implementation, and experiment evidence -- not neuroanatomical accuracy.
</div>
<div class="layout">
  <div class="canvas-wrap">
    <div class="toolbar">
      <button type="button" id="btnResetView">Reset view</button>
      <button type="button" id="btnViewAnatomy" class="mode-on">Anatomy</button>
      <button type="button" id="btnViewPathways">Pathways</button>
      <label><input type="checkbox" id="layerImpl" checked> Implementation</label>
      <label><input type="checkbox" id="layerClaims" checked> Claims</label>
      <label><input type="checkbox" id="layerEvidence" checked> Evidence</label>
      <label><input type="checkbox" id="layerFrontier" checked> Leading edge</label>
      <label><input type="checkbox" id="layerGhost" checked> Ghost regions</label>
    </div>
    <div id="svgHost"></div>
  </div>
  <aside class="sidebar" id="sidebar">
    <p class="empty">Click a region to inspect claims and status.</p>
  </aside>
</div>
<script>
(function () {
  const TIER_FILL = {
    expressed: "rgba(46, 160, 67, 0.55)",
    claimed: "rgba(210, 153, 34, 0.45)",
    frontier: "rgba(163, 113, 247, 0.5)",
    absent: "rgba(72, 79, 88, 0.35)",
  };
  const IMPL_DIM = { full: 1, partial: 0.65, claim_only: 0.35 };

  let payload = null;
  let nodeById = {};
  let selectedId = null;
  let viewMode = "anatomy";
  let scale = 1, tx = 0, ty = 0;
  let drag = null;

  const $ = (id) => document.getElementById(id);

  async function load() {
    const r = await fetch("/api/brain-map?t=" + Date.now(), { cache: "no-store" });
    payload = await r.json();
    if (payload.disclaimer) $("disclaimer").textContent = payload.disclaimer;
    $("genTime").textContent = "generated " + (payload.generated_at || "");
    nodeById = {};
    (payload.regions || []).forEach((n) => { nodeById[n.id] = n; });
    (payload.engineering_nodes || []).forEach((n) => { nodeById[n.id] = n; });
    await loadSvg();
    applyLayers();
    const params = new URLSearchParams(location.search);
    const region = params.get("region");
    const claim = params.get("claim");
    if (region && nodeById[region]) selectNode(region);
    else if (claim) selectByClaim(claim);
  }

  async function loadSvg() {
    const url = payload.svg_url || "/docs/architecture/brain_map_sagittal.svg";
    const text = await fetch(url + "?t=" + Date.now(), { cache: "no-store" }).then((r) => r.text());
    $("svgHost").innerHTML = text;
    const svg = $("svgHost").querySelector("svg");
    if (!svg) return;
    svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
    bindRegionClicks(svg);
    setupPanZoom(svg);
    drawPathways();
  }

  function bindRegionClicks(svg) {
    svg.querySelectorAll(".brain-region, .eng-node").forEach((el) => {
      const rid = el.getAttribute("data-region") || el.id.replace(/^region_/, "").replace(/^node_/, "");
      el.addEventListener("click", (ev) => {
        ev.stopPropagation();
        const nid = resolveNodeId(rid, el.id);
        if (nid) selectNode(nid);
      });
    });
  }

  function resolveNodeId(dataRegion, elId) {
    if (nodeById[dataRegion]) return dataRegion;
    if (nodeById[elId]) return elId;
    const alt = elId.replace(/^region_/, "").replace(/^node_/, "");
    if (nodeById[alt]) return alt;
    if (dataRegion === "policy") return "policy_engineering";
    return dataRegion;
  }

  function regionFill(node) {
    if (!node) return TIER_FILL.absent;
    const tier = node.coverage_tier || "claimed";
    const rgb = {
      expressed: [46, 160, 67],
      claimed: [210, 153, 34],
      frontier: [163, 113, 247],
      absent: [72, 79, 88],
    };
    const c = rgb[tier] || rgb.claimed;
    let alpha = { expressed: 0.55, claimed: 0.45, frontier: 0.5, absent: 0.35 }[tier] || 0.4;
    if ($("layerImpl").checked) {
      const dim = IMPL_DIM[node.implementation] || 0.35;
      alpha = Math.min(0.85, Math.max(0.12, alpha * dim + 0.12));
    }
    return "rgba(" + c[0] + "," + c[1] + "," + c[2] + "," + alpha + ")";
  }

  function applyLayers() {
    const svg = $("svgHost").querySelector("svg");
    if (!svg || !payload) return;
    const showGhost = $("layerGhost").checked;
    const allNodes = [...(payload.regions || []), ...(payload.engineering_nodes || [])];
    allNodes.forEach((node) => {
      (node.svg_path_ids || []).forEach((pid) => {
        const el = svg.getElementById(pid);
        if (!el) return;
        const isGhost = (node.scope || "") === "out_of_scope";
        if (isGhost && !showGhost) {
          el.classList.add("hidden-layer");
          el.style.fill = TIER_FILL.absent;
          return;
        }
        el.classList.remove("hidden-layer");
        let fill = regionFill(node);
        if (!$("layerClaims").checked && !$("layerEvidence").checked) {
          fill = "rgba(48, 54, 60, 0.4)";
        }
        if ($("layerFrontier").checked && node.leading_edge && node.coverage_tier !== "expressed") {
          fill = TIER_FILL.frontier;
        }
        if ($("layerEvidence").checked && node.evidence && node.evidence.pass_runs > 0) {
          fill = TIER_FILL.expressed;
        }
        el.style.fill = fill;
        el.classList.toggle("selected", node.id === selectedId);
      });
    });
    drawPathways();
  }

  function drawPathways() {
    const svg = $("svgHost").querySelector("svg");
    if (!svg || !payload) return;
    let g = svg.getElementById("pathway_overlay");
    if (!g) return;
    g.innerHTML = "";
    if (viewMode !== "pathways") return;
    (payload.pathways || []).forEach((pw) => {
      (pw.edges || []).forEach((edge) => {
        if (!edge.from_xy || !edge.to_xy) return;
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", edge.from_xy[0]);
        line.setAttribute("y1", edge.from_xy[1]);
        line.setAttribute("x2", edge.to_xy[0]);
        line.setAttribute("y2", edge.to_xy[1]);
        line.setAttribute("stroke", "#58a6ff");
        line.setAttribute("stroke-opacity", "0.7");
        line.setAttribute("marker-end", "url(#arrow)");
        g.appendChild(line);
      });
    });
  }

  function selectNode(id) {
    selectedId = id;
    applyLayers();
    renderSidebar(nodeById[id]);
    history.replaceState(null, "", "?region=" + encodeURIComponent(id));
  }

  function selectByClaim(claimId) {
    for (const n of Object.values(nodeById)) {
      if ((n.claim_ids || []).includes(claimId)) {
        selectNode(n.id);
        return;
      }
    }
    $("sidebar").innerHTML = "<p class=\"empty\">Claim " + claimId + " not mapped to a region.</p>";
  }

  function renderSidebar(node) {
    if (!node) {
      $("sidebar").innerHTML = "<p class=\"empty\">No region selected.</p>";
      return;
    }
    const tier = node.coverage_tier || "claimed";
    const ex = node.evidence || {};
    let html = "<h2>" + esc(node.label) + "</h2>";
    html += "<span class=\"badge badge-" + esc(tier) + "\">" + esc(tier) + "</span>";
    html += "<span class=\"badge badge-" + esc(tier) + "\">" + esc(node.implementation || "") + "</span>";
    if (node.scope === "out_of_scope") {
      html += "<p class=\"meta\">Out of scope for current REE design.</p>";
    } else if (node.scope === "engineering") {
      html += "<p class=\"meta\">Engineering substrate (not a cortical region).</p>";
    }
    if (node.notes) html += "<p class=\"meta\">" + esc(node.notes) + "</p>";
    html += "<div class=\"stat-grid\">";
    html += stat("Claims", node.claim_count);
    html += stat("v3 pending", node.v3_pending_count);
    html += stat("PASS runs", ex.pass_runs || 0);
    html += stat("FAIL runs", ex.fail_runs || 0);
    html += stat("Genuine exp", ex.genuine_exp_count || 0);
    html += stat("Leading edge", node.leading_edge ? "yes" : "no");
    html += "</div>";
    if ((node.queued_exqs || []).length) {
      html += "<p class=\"meta\"><b>Queued EXQs</b></p><ul class=\"claim-list\">";
      node.queued_exqs.forEach((q) => {
        html += "<li>" + esc(q.queue_id || "") + " -- " + esc(q.title || "").slice(0, 80) + "</li>";
      });
      html += "</ul>";
    }
    if ((node.primary_docs || []).length) {
      html += "<p class=\"meta\"><b>Docs</b></p><ul class=\"claim-list\">";
      node.primary_docs.slice(0, 6).forEach((d) => {
        html += "<li><a href=\"/" + esc(d) + "\" target=\"_blank\" rel=\"noopener\">" + esc(d.split("/").pop()) + "</a></li>";
      });
      html += "</ul>";
    }
    html += "<p class=\"meta\"><b>Claims</b> (sample)</p><ul class=\"claim-list\">";
    (node.claims_sample || []).forEach((c) => {
      html += "<li><a href=\"/explorer.html#claim-" + esc(c.id) + "\" target=\"_blank\" rel=\"noopener\">" +
        esc(c.id) + "</a> " + esc((c.title || "").slice(0, 70)) + "</li>";
    });
    if ((node.claim_ids || []).length > 12) {
      html += "<li class=\"meta\">+" + ((node.claim_ids.length) - 12) + " more</li>";
    }
    html += "</ul>";
    html += "<div class=\"legend\">";
    html += leg(TIER_FILL.expressed, "expressed");
    html += leg(TIER_FILL.claimed, "claimed");
    html += leg(TIER_FILL.frontier, "frontier");
    html += leg(TIER_FILL.absent, "absent / ghost");
    html += "</div>";
    $("sidebar").innerHTML = html;
  }

  function stat(k, v) {
    return "<div><span>" + esc(k) + "</span>" + esc(String(v)) + "</div>";
  }
  function leg(color, label) {
    return "<span><i style=\"background:" + color + "\"></i>" + esc(label) + "</span>";
  }
  function esc(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");
  }

  function setupPanZoom(svg) {
    const host = $("svgHost");
    function applyTransform() {
      svg.style.transform = "translate(" + tx + "px," + ty + "px) scale(" + scale + ")";
      svg.style.transformOrigin = "center center";
    }
    host.addEventListener("wheel", (ev) => {
      ev.preventDefault();
      const d = ev.deltaY > 0 ? 0.92 : 1.08;
      scale = Math.min(3, Math.max(0.4, scale * d));
      applyTransform();
    }, { passive: false });
    host.addEventListener("mousedown", (ev) => {
      if (ev.target.closest(".brain-region, .eng-node")) return;
      drag = { x: ev.clientX - tx, y: ev.clientY - ty };
    });
    window.addEventListener("mousemove", (ev) => {
      if (!drag) return;
      tx = ev.clientX - drag.x;
      ty = ev.clientY - drag.y;
      applyTransform();
    });
    window.addEventListener("mouseup", () => { drag = null; });
    $("btnResetView").onclick = () => { scale = 1; tx = 0; ty = 0; applyTransform(); };
    applyTransform();
  }

  ["layerImpl", "layerClaims", "layerEvidence", "layerFrontier", "layerGhost"].forEach((id) => {
    $(id).addEventListener("change", applyLayers);
  });
  $("btnViewAnatomy").onclick = () => {
    viewMode = "anatomy";
    $("btnViewAnatomy").classList.add("mode-on");
    $("btnViewPathways").classList.remove("mode-on");
    drawPathways();
  };
  $("btnViewPathways").onclick = () => {
    viewMode = "pathways";
    $("btnViewPathways").classList.add("mode-on");
    $("btnViewAnatomy").classList.remove("mode-on");
    drawPathways();
  };

  load();
  setInterval(load, 60000);
})();
</script>
</body>
</html>
