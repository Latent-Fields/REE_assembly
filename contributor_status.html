<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REE Experiment Monitor</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #242740;
    --border: #2e3250;
    --accent: #6c8ef5;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --orange: #fb923c;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --code-bg: #0d1117;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    padding: 1.5rem 1rem;
  }
  .container { max-width: 720px; margin: 0 auto; }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  header h1 { font-size: 1.3rem; font-weight: 700; color: var(--text); }
  header h1 span { color: var(--accent); }
  #last-updated { font-size: 0.75rem; color: var(--muted); }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.2rem 0.75rem;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    margin-bottom: 1rem;
  }
  .status-running { background: rgba(108,142,245,0.15); color: var(--accent); border: 1px solid rgba(108,142,245,0.3); }
  .status-idle    { background: rgba(148,163,184,0.1);  color: var(--muted); border: 1px solid rgba(148,163,184,0.2); }
  .status-error   { background: rgba(248,113,113,0.1);  color: var(--red);   border: 1px solid rgba(248,113,113,0.3); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .dot.pulse { animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem 1.3rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 0.7rem;
  }
  .exp-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.25rem; }
  .exp-meta  { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.75rem; }

  .progress-wrap { margin-bottom: 0.4rem; }
  .progress-bar-bg {
    background: var(--surface2);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 0.3rem;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 1s ease;
  }
  .progress-text { font-size: 0.75rem; color: var(--muted); display: flex; justify-content: space-between; }

  .run-detail {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.5rem;
  }

  .log-lines {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.8rem;
    margin-top: 0.75rem;
    font-family: 'Menlo', 'Consolas', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 90px;
    overflow: hidden;
  }

  .section-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 1.25rem 0 0.5rem;
  }

  .result-row {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    padding: 0.45rem 0;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .result-row:last-child { border-bottom: none; }

  .badge {
    display: inline-block;
    padding: 0.1rem 0.5rem;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .badge-pass  { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge-fail  { background: rgba(248,113,113,0.12); color: var(--red); }
  .badge-error { background: rgba(251,146,60,0.15); color: var(--orange); }
  .badge-id    { background: var(--surface2); color: var(--muted); font-weight: 400; }

  .result-title { font-size: 0.85rem; flex: 1; min-width: 0; }
  .result-meta  { font-size: 0.72rem; color: var(--muted); flex-shrink: 0; }

  .queue-item {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    padding: 0.35rem 0;
    border-bottom: 1px solid var(--border);
  }
  .queue-item:last-child { border-bottom: none; }
  .queue-id   { font-size: 0.72rem; color: var(--muted); flex-shrink: 0; }
  .queue-title { font-size: 0.83rem; flex: 1; }
  .queue-est  { font-size: 0.72rem; color: var(--muted); flex-shrink: 0; }

  .empty { color: var(--muted); font-size: 0.85rem; font-style: italic; }

  #error-msg {
    display: none;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 8px;
    padding: 0.9rem 1.1rem;
    color: var(--red);
    font-size: 0.85rem;
    margin-bottom: 1rem;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>REE <span>Experiment Monitor</span></h1>
    <span id="last-updated">—</span>
  </header>

  <div id="error-msg"></div>
  <div id="status-pill"></div>
  <div id="current-card"></div>

  <div class="section-title" id="queue-title" style="display:none">Pending queue</div>
  <div class="card" id="queue-card" style="display:none"></div>

  <div class="section-title" id="completed-title" style="display:none">Recent completions</div>
  <div class="card" id="completed-card" style="display:none"></div>

</div>
<script>
// runner_status.json can live at two relative paths depending on server root:
//   short: served from REE_assembly/ (preview panel, or http.server inside REE_assembly)
//   long:  served from parent REE_Working/ (the contributor launcher)
const STATUS_PATHS = [
  'evidence/experiments/runner_status.json',
  'REE_assembly/evidence/experiments/runner_status.json',
];
let STATUS_URL = STATUS_PATHS[0]; // resolved on first successful fetch
const POLL_MS = 5000;

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtTime(secs) {
  if (!secs || secs <= 0) return '';
  if (secs > 90) return `~${Math.round(secs / 60)} min left`;
  return `~${Math.round(secs)} sec left`;
}

function fmtDate(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  } catch { return iso.slice(11,16); }
}

function badgeHtml(result) {
  const r = (result || '').toUpperCase();
  if (r === 'PASS')  return `<span class="badge badge-pass">PASS</span>`;
  if (r === 'FAIL')  return `<span class="badge badge-fail">FAIL</span>`;
  if (r === 'ERROR') return `<span class="badge badge-error">ERROR</span>`;
  return `<span class="badge badge-id">${esc(r)}</span>`;
}

function render(data) {
  // Header timestamp
  document.getElementById('last-updated').textContent =
    'Updated ' + fmtDate(data.last_updated);

  // Status pill
  const pillEl = document.getElementById('status-pill');
  const isRunning = data.current && !data.idle;
  if (isRunning) {
    pillEl.innerHTML = `<div class="status-pill status-running"><div class="dot pulse"></div> Running</div>`;
  } else {
    pillEl.innerHTML = `<div class="status-pill status-idle"><div class="dot"></div> Idle</div>`;
  }

  // Current experiment
  const cur = data.current;
  const curEl = document.getElementById('current-card');
  if (cur && !data.idle) {
    const p = cur.progress || {};
    const pct = p.overall_pct || 0;
    const remaining = fmtTime(cur.seconds_remaining);
    const runDetail = (p.runs_total > 1)
      ? `Run ${p.runs_done + 1} / ${p.runs_total} — episode ${p.episodes_done || 0} / ${p.episodes_total || '?'}`
      : `Episode ${p.episodes_done || 0} / ${p.episodes_total || '?'}`;
    const logLines = (cur.recent_lines || []).slice(-4).join('\n');

    curEl.innerHTML = `
      <div class="card">
        <div class="card-title">Now running</div>
        <div class="exp-title">${esc(cur.title)}</div>
        <div class="exp-meta">${esc(cur.queue_id)}${cur.claim_id ? ' · ' + esc(cur.claim_id) : ''} · started ${fmtDate(cur.started_at)}</div>
        <div class="progress-wrap">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <div class="progress-text">
            <span>${pct.toFixed(0)}%</span>
            <span>${remaining}</span>
          </div>
        </div>
        <div class="run-detail">${esc(runDetail)}</div>
        ${logLines ? `<div class="log-lines">${esc(logLines)}</div>` : ''}
      </div>`;
    curEl.style.display = '';
  } else {
    curEl.innerHTML = '';
    curEl.style.display = 'none';
  }

  // Pending queue (exclude running/completed items)
  const queue = (data.queue || []).filter(q => q.status !== 'completed' && q.status !== 'failed' && q.status !== 'running');
  const queueTitleEl = document.getElementById('queue-title');
  const queueEl = document.getElementById('queue-card');
  if (queue.length > 0) {
    queueTitleEl.style.display = '';
    queueEl.style.display = '';
    queueEl.innerHTML = queue.map(q => `
      <div class="queue-item">
        <span class="queue-id">${esc(q.queue_id)}</span>
        <span class="queue-title">${esc(q.title)}</span>
        ${q.estimated_minutes ? `<span class="queue-est">~${q.estimated_minutes} min</span>` : ''}
      </div>`).join('');
  } else {
    queueTitleEl.style.display = 'none';
    queueEl.style.display = 'none';
  }

  // Recent completions
  const completed = (data.completed || []).slice().reverse().slice(0, 15);
  const compTitleEl = document.getElementById('completed-title');
  const compEl = document.getElementById('completed-card');
  if (completed.length > 0) {
    compTitleEl.style.display = '';
    compEl.style.display = '';
    compEl.innerHTML = completed.map(c => {
      const by = c.completed_by ? ` · ${esc(c.completed_by)}` : '';
      const dur = c.actual_secs > 0 ? ` · ${Math.round(c.actual_secs / 60)} min` : '';
      return `
        <div class="result-row">
          ${badgeHtml(c.result)}
          <span class="badge badge-id">${esc(c.queue_id)}</span>
          <span class="result-title">${esc(c.title)}</span>
          <span class="result-meta">${fmtDate(c.completed_at)}${dur}${by}</span>
        </div>`;
    }).join('');
  } else {
    compTitleEl.style.display = 'none';
    compEl.style.display = 'none';
  }
}

function renderError(msg) {
  const el = document.getElementById('error-msg');
  el.style.display = 'block';
  el.textContent = msg;
}

async function poll() {
  // Try each candidate path; use the first that succeeds (and remember it).
  for (const path of STATUS_PATHS) {
    try {
      const r = await fetch(path + '?t=' + Date.now());
      if (!r.ok) continue;
      STATUS_URL = path;          // remember working path for future polls
      STATUS_PATHS.length = 0;    // stop trying others
      STATUS_PATHS.push(path);
      document.getElementById('error-msg').style.display = 'none';
      render(await r.json());
      return;
    } catch (_) { /* try next */ }
  }
  renderError('Could not load runner_status.json — runner not started yet, or this page was opened directly rather than via the monitor launcher.');
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
