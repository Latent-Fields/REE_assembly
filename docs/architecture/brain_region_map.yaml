pathways:
  - id: predictive_stack
    label: Predictive stack
    edges:
      - [e1, e2]
      - [e2, hippocampus]
      - [hippocampus, e3]

  - id: theta_frontal_hpc
    label: Theta frontal-hippocampal
    edges:
      - [e1, hippocampus]
      - [pfc, hippocampus]
    claim_subjects:
      - architecture.theta_frontal_hippocampal_goal

  - id: affect_salience
    label: Affect and salience
    edges:
      - [amygdala, hippocampus]
      - [amygdala, cingulate]
      - [cingulate, pfc]

  - id: commitment_loop
    label: Commitment loop
    edges:
      - [basal_ganglia, e3]
      - [control_plane, basal_ganglia]

  - id: offline_consolidation
    label: Offline consolidation
    edges:
      - [sleep, hippocampus]
      - [sleep, default_mode]
