  implementation_note: >
    BISTABLE LATCH IMPLEMENTED 2026-04-10. REEAgent._e3_tick() and select_action() in
    ree_core/agent.py. Config: HeartbeatConfig.beta_gate_bistable (bool, False default).
    When bistable=True: gate elevates only on ENTRY to committed state (committed AND NOT
