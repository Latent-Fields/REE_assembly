# Registered 2026-03-15 — imagination / residue write gate cluster
# Source: phenomenological analysis of imagination vs experience distinction
- id: MECH-094
  title: "The system maintains a functional distinction between simulation-mode content and real-experience content, such that simulation content does not accumulate in the viability map as committed experience; failures of this distinction produce confabulation (simulated events encoded as real)."
  claim_type: mechanism_hypothesis
  subject: default_mode.simulation_real_distinction_write_profile
  polarity: asserts
  status: candidate
  claim_level: functional
  evidence_quality_note: |
    EXQ-140 reclassified non_contributory (2026-04-09): substrate gap -- no explicit
    simulation/real distinction mechanism implemented in ree_core. Claim held pending
    implementation of one or more of the candidate biological mechanisms (MECH-248
    source monitoring, MECH-249 neuromodulatory mode-setting). Updated 2026-04-16:
    'hypothesis_tag as categorical gate' language removed; claim reframed as functional
    requirement whose biological implementation is distributed and pending lit-pull
    evidence (EVB-0134, EVB-0135).
  depends_on:
    - ARC-014
    - INV-011
    - INV-019
    - MECH-060
    - MECH-029
    - MECH-248
    - MECH-249
  location: docs/architecture/default_mode.md#mech-094
  source:
    - docs/architecture/default_mode.md
    - docs/architecture/control_plane_heartbeat.md
  notes: >
    The functional requirement registered by MECH-094 is that simulation-mode content --
    internally generated trajectories, rehearsal, imagination -- must not accumulate in
    phi(z) as committed experience. This is what must be true for the architecture to
    maintain the separation between what the agent has done and what it has only rehearsed.
    The biological implementation is not a single categorical gate but a distributed set of
    overlapping mechanisms: source monitoring (frontoparietal network -- distinguishing
    internally generated from externally received content; candidate implementation:
    MECH-248), temporal context filtering (OFC/basal forebrain -- suppressing
    non-currently-relevant activated content; Schnider 2003), and neuromodulatory
    mode-setting (ACh/NE balance -- setting hippocampal encoding mode as a continuous
    state variable rather than a binary gate; candidate implementation: MECH-249). The
    'hypothesis_tag' shorthand refers to the combined functional effect of these
    mechanisms, not a specific identifiable circuit element.
    During DMN/simulation mode, the functional effect is that only pre-commit simulation
    error (MECH-060) is active at the terrain-update level; the post-commit
    realized-outcome channel is not engaged. This is the condition that prevents phi(z)
    terrain from being updated by simulated trajectories as if they were committed
    experience. The qualitatively different affective texture of imagination vs. real
    experience -- muted, hypothetical, without full somatic grounding -- is consistent
    with this functional separation, though the precise mechanistic implementation awaits
    the MECH-248/249 evidence. Implements INV-011 (imagination without belief update)
    and INV-019 (rehearsal/durable-update separation) at the functional level.
    Pathological failure: when the simulation/real distinction fails -- confabulation --
    simulated or replayed content accumulates in phi(z) as if real experience (MECH-076
    map deformation). The confabulation mechanism is the failure of source monitoring
    and/or temporal context filtering (Schnider 2003), not excessive vividness or
    intensity of simulation. In rumination, repeated simulated-harm trajectories
    accumulate as if they were real harm experiences. This is mechanistically distinct
    from psychosis (prior-dominated precision failure, MECH-244; or signal-degradation
    pathway, MECH-246; or trauma-shaped prior pathway, MECH-247) and hallucination
    (generative model dominance without bottom-up grounding, MECH-245), which require
    separate mechanisms. Simulation-driven viability map updates (MECH-092) are safe to
    the degree that the source-monitoring and neuromodulatory mechanisms distinguishing
    simulation from reality are intact. Updated 2026-04-16 based on Papez circuit
    lit-pull discussion: categorical gate language removed, functional framing adopted,
    biological implementation candidates MECH-248/249 registered.
