- id: SD-024
  title: "DA-modulated RBF center density: dopaminergic signal at reward encounters allocates multiple closely-spaced RBF centers in the hippocampal residue field, creating representational expansion at reward locations without requiring environmental richness."
  claim_type: design_decision
  subject: hippocampal_module.da_modulated_rbf_density
  polarity: asserts
  status: candidate
  registered: "2026-04-14"
  depends_on:
    - SD-004
    - SD-014
    - MECH-232
  location: docs/architecture/sd_024_da_modulated_rbf_density.md
  notes: >
    Workaround for ARC-057 substrate constraint: instead of requiring an informationally
    rich environment, the hippocampal RBF layer itself creates more internal structure at
    DA-modulated locations. When a reward encounter triggers a phasic DA signal (scaled
    by benefit_magnitude * drive_level per SD-012), multiple RBF centers are allocated in
    a local z_world neighborhood with jittered positions. This creates a cluster of
    closely-spaced centers -- higher representational density -- at reward locations.
    Harm events continue to allocate single centers (no DA modulation), preserving the
    MECH-233 asymmetry. The FIFO center lifecycle provides natural decay: when the agent
    stops encountering reward, the expanded cluster gradually gets overwritten.
    Key parameters: da_allocation_scale (extra centers per DA), da_jitter_radius (cluster
    spread), num_centers (increased from 32 to 64+ to accommodate expansion).
    MECH-094 gate required: replay/simulation events must NOT trigger DA expansion.
    Informative failure modes: craving (expansion persists after reward removal),
    anhedonia (DA=0, uniform map, no directional preference), perseveration (DA locked
    high, all locations expanded, no reorientation).
    Biologically grounded: Retailleau & Morris 2018 showed place cells reorient to reward
    features via D1 receptors; rats in uniform corridors still get sharper fields near
    reward end. The brain allocates more resources regardless of environmental justification.

- id: SD-025
  title: "Curiosity drive: information-seeking bias in hippocampal trajectory scoring that favors regions of higher representational density in the RBF map."
  claim_type: design_decision
  subject: hippocampal_module.curiosity_drive
  polarity: asserts
  status: candidate
  registered: "2026-04-14"
  depends_on:
    - SD-024
    - SD-004
    - ARC-057
    - MECH-111
    - INV-051
  location: docs/architecture/sd_024_da_modulated_rbf_density.md#curiosity-drive
  notes: >
    The second component of ARC-057: a curiosity/information-seeking drive that biases
    CEM trajectory scoring toward regions of higher representational density in the
    hippocampal RBF layer. The drive computes local density (active centers within
    bandwidth radius, weighted by proximity) and novelty (density * (1 - familiarity)).
    The curiosity bonus is added to the CEM terrain_score.
    Critical property: the curiosity drive is uniform -- it does the same computation
    everywhere. Approach behavior emerges because DA-expanded regions (SD-024) have
    higher density, so they score higher. The agent does not "know" it is approaching
    reward; it is simply exploring available representational structure.
    The familiarity component (visit-count EMA) prevents the agent from endlessly
    circling already-explored regions, while the density component ensures that
    DA-expanded regions remain attractive even after visits (because there are more
    centers to distinguish between).
    Parameters: curiosity_weight (CEM scoring bonus), familiarity_ema_alpha (decay rate).
    Both default to 0 for backward compatibility.
    Test: ARC-057 requires BOTH SD-024 and SD-025 active. Neither alone should produce
    significant approach behavior (interaction effect, not additive).

- id: MECH-220
  title: harm_stream_hub_coordination
  claim_type: mechanism_hypothesis
  subject: harm_stream.cross_stream_hub
  polarity: asserts
  status: candidate
  implementation_phase: v3
  depends_on: [SD-011, SD-020, SD-021, ARC-016]
  description: >
    A lightweight cross-stream coordination mechanism (harm hub) allows z_harm_s and
    z_harm_a to share context without collapsing into a single stream. The hub implements
    two directed interactions: (1) z_harm_a receives z_harm_s PE magnitude as context
    (sensory surprise informs affective load update rate); (2) z_harm_s precision is gated
    by z_harm_a urgency level (high affective load amplifies sensory sensitivity -- the
    hypervigilance pathway). This is NOT a fusion: the streams maintain separate encoders,
    separate training targets, and separate functional roles. The hub is a gating/attention
    mechanism that coordinates their interaction.
  notes: >
    Derived from Chen (2023) "cingulate-insula hub" concept. Chen's central claim: the
    two pain pathways are not fully independent parallel channels but are coordinated
    by a cingulate-insula hub with four functions: salience detection, cortical-subcortical
    integration, network switching, and ACC functional coupling. Our current implementation
    has z_harm_s and z_harm_a as completely independent encoders with zero cross-talk.
    The hub mechanism addresses this gap with minimal architectural change: a single
    attention/gating layer after the two encoders, parameterised by hub_weight.
    Testable prediction: hub_weight > 0 should improve both forward model R^2 (z_harm_s
    benefits from affective context for precision) and urgency calibration (z_harm_a
    benefits from sensory PE for surprise detection). A hub_weight ablation should show
    performance degradation vs the coordinated version.
  registered: "2026-04-08"
  location: docs/architecture/sd_011_dual_nociceptive_streams.md
  literature_confidence: 0.878
  literature_evidence: |
    4 entries in evidence/literature/targeted_review_connectome_mech_220/.
    Wager et al. (2013, NEJM): fMRI-based neurologic signature of physical pain (NPS).
    Menon & Uddin (2010, TICS): saliency, switching, attention and control (insula hub).
    Seeley et al. (2007, J Neurosci): salience network and insular-ACC hub.
    Wiech et al. (2010, Neuron): perceptual salience and modulatory role of insula in pain.

- id: ARC-052
  title: harm_precision_weighting
  claim_type: architecture_hypothesis
  subject: harm_stream.dynamic_precision
  polarity: asserts
  status: candidate
  implementation_phase: v3
  depends_on: [SD-011, SD-020, ARC-016, MECH-220]
  description: >
    Each harm stream outputs a precision estimate alongside its latent vector. E3's use of
    harm streams is weighted by their respective precisions: high-precision z_harm_s has more
    influence on attribution (SD-003), high-precision z_harm_a has more influence on commit
    gating. Precision is context-dependent: (1) z_harm_s precision increases with forward
    model accuracy (when E2_harm_s predictions are good, the PE is more informative);
    (2) z_harm_a precision increases with accumulation stability (when threat state is
    changing rapidly, z_harm_a is less precise -- high volatility reduces confidence in the
    accumulated state). Neuromodulatory inputs (serotonin, norepinephrine) modulate the
    precision gains, matching Chen (2023) ACh/NE/DA precision control framework.
  notes: >
    This extends ARC-016 (dynamic precision) into the harm stream specifically. Chen (2023)
    formalizes gain = xi_2 / (xi_2 + xi_1) where relative precision determines how much PE
    updates the prediction. Our current harm encoders have fixed architectures with no
    precision output. Adding a precision head (sigma output alongside mu) to each encoder
    enables the precision-weighted framework. Implementation: HarmEncoder and
    AffectiveHarmEncoder each output (z, log_sigma); E3 weights inputs by exp(-log_sigma).
    V3 scope: implement precision heads but use fixed precision initially; modulate in
    experiments. V4: wire neuromodulatory control (SerotoninModule already exists).
  registered: "2026-04-08"

# Registered 2026-04-11 -- attribution failure mode taxonomy and psychosis substrates
# Source: conversation developing self-attribution overflow, animated agency bias, pre-coherency gate
- id: MECH-221
  title: "z_world must be continuously residualized against z_self predictions; efference-copy subtraction is not limited to SD-003 query time."
  claim_type: mechanism_hypothesis
  subject: latent_stack.continuous_self_residualization
  polarity: asserts
  status: candidate
  implementation_phase: v3
  depends_on:
    - SD-005
    - SD-007
    - MECH-095
  notes: >
    SD-003 provides a query-time counterfactual (E2(z_t, a_actual) - E2(z_t, a_cf)) that
    answers "did I cause this specific outcome?" at attribution time. MECH-221 is the
    orthogonal continuous requirement: z_world must never contain self-predicted content in
    the first place. At each timestep, the contribution of the agent's own motor commands
    to the observed z_world update must be subtracted before z_world is read by any
    downstream system (E3, hippocampus, residue field, coherency calculation). This
    continuous residualization is distinct from SD-007 (reafference subtraction in the
    z_self domain) in target: SD-007 removes reafference from z_self; MECH-221 removes
    the forward-projected z_self footprint from z_world. The efference-copy signal must
    be routed to a z_world decontamination pathway as well as to the MECH-095 comparator.
    Failure of continuous residualization activates MECH-222 (self-attribution contamination
    psychosis): self-generated predictions persist in z_world and are confirmed by coherency
    checks, producing false veridical sense of world responding to self. The continuous
    nature of the requirement distinguishes it from SD-003 (query-time) and MECH-095
    (comparator-based detection): residualization must precede all downstream access to
    z_world, not just at attribution query points.
  registered: "2026-04-11"

- id: MECH-222
  title: "Failure of continuous z_self residualization produces self-attribution contamination psychosis: referential delusion and thought broadcasting substrate."
  claim_type: mechanism_hypothesis
  subject: pathology.self_attribution_overflow_psychosis
  polarity: asserts
  status: candidate
  implementation_phase: v3
  competing_claims:
    - id: MECH-094
      discrimination: >
        MECH-094 is tag-loss psychosis: the hypothesis tag write gate fails during replay,
        opening the post-commit channel during what is structurally a simulation event.
        Residue accumulates from replayed/simulated content. Mechanism: episodic, triggered
        at replay boundaries. Clinical fingerprint: PTSD flashback, intrusive vivid memory
        with affective weight (the simulation feels real because the post-commit somatic
        channel is open). MECH-222 is efference-copy subtraction failure: self-predicted
        world content persists continuously in z_world and is confirmed by coherency checks
        every timestep. Mechanism: continuous, timestep-level contamination. Clinical
        fingerprint: referential delusion, thought broadcasting, grandiosity with
        internally consistent delusional logic. Dissociation criterion: MECH-094 fails
        episodically at replay events; MECH-222 fails continuously during all z_world
        construction. An agent could exhibit one without the other.
    - id: MECH-065
      discrimination: >
        MECH-065 psychosis arises from precision-ratio miscalibration: the ratio of
        internal-model precision to external-authority precision is too low, making the
        RC-conflict lane vulnerable to spoofing by external signals. Directionality is
        inbound -- external signals override the internal model. Clinical fingerprint:
        paranoid ideation driven by over-attributed authority to external agents (signals
        from outside impose on the agent). MECH-222 is the opposite directionality:
        outbound contamination -- internal self-predictions over-populate z_world and the
        agent's model imposes itself on the world representation. The agent does not feel
        controlled by external forces but experiences the world as responding to its own
        internal states.
  depends_on:
    - MECH-221
    - MECH-094
    - MECH-065
    - INV-066
  notes: >
    When MECH-221 (continuous z_self residualization) fails, self-generated motor
    predictions persist in z_world. The coherency calculation (MECH-065 RC-conflict lane;
    broader verisimilitude signalling) then finds z_world consistent with the agent's
    own predictions -- not because the world is responding to the agent, but because the
    agent's predictions were never subtracted. This false coherency is computationally
    indistinguishable from genuine world confirmation of self-generated content, and the
    invariant INV-066 is the reason it cannot self-correct. Clinical substrate: the agent
    experiences world events as caused by or responding to itself. Referential delusion:
    environmental events are interpreted as self-directed because z_world contains the
    agent's own prediction footprint. Thought broadcasting: the agent's predicted motor
    outcomes appear as world-facts, creating the sense that internal states have external
    reality. Grandiosity: persistent positive predicted outcomes in z_world (never corrected
    by actual outcome because the subtraction that would expose the gap is missing) create
    an inflated causal self-model. This is a structurally different failure from MECH-094
    (episodic tag-loss) and MECH-065 (external signal miscalibration). The three psychosis
    substrates are registered as distinct claims to enable experimental dissociation (Q-037).
  registered: "2026-04-11"

- id: MECH-223
  title: "Animated agency attribution overweighting: systematic bias toward attributing intentional causation to animated/moving entities requires active calibration in the attribution pathway."
  claim_type: mechanism_hypothesis
  subject: attribution.animated_agency_overweighting_bias
  polarity: asserts
  status: candidate
  competing_claims:
    - id: MECH-222
      discrimination: >
        MECH-222 is self-attribution overflow (outbound: self-predictions contaminate
        z_world). MECH-223 is other-attribution overweighting (inbound: animated entities
        over-attract intentional-causation attribution from the MECH-095 pathway).
        Both can contribute to ideas of reference but via distinct substrates and with
        distinguishable clinical signatures. MECH-222 produces a coherent self-referential
        world model diffusely ('the world responds to me', no specific agent target);
        MECH-223 produces paranoid ideation directed at specific animated entities
        ('that person/thing is acting toward me'). Dissociation criterion: ablating
        MECH-221 without touching MECH-095 calibration should produce MECH-222 symptoms;
        miscalibrating the MECH-095 prior without disrupting residualization should
        produce MECH-223 symptoms.
    - id: MECH-095
      discrimination: >
        MECH-095 is the TPJ agency-detection comparator: the functional mechanism
        comparing efference-copy-predicted z_self change with observed change to determine
        self-caused vs other-caused attribution. MECH-223 is a calibration claim about
        MECH-095: the comparator is structurally correct but carries an adaptive prior
        that systematically overweights agency attribution in animated/biological-motion
        stimuli. MECH-095 describes the mechanism; MECH-223 describes a systematic bias
        in the prior of that mechanism. The bias is architecturally separable from the
        comparator's function.
  depends_on:
    - MECH-095
    - SD-005
  notes: >
    The agency detection pathway (MECH-095 / TPJ comparator) receives its primary input
    through the lateral visual stream specialised for biological motion (MT -> MST ->
    posterior STS -> TPJ). This stream carries an adaptive prior for detecting intentional
    agency -- useful for predator detection and social navigation -- that creates a
    systematic overweighting of agency attribution to animated or moving entities regardless
    of specific evidence. In a well-calibrated agent this prior is managed by corrective
    feedback; under attentional narrowing, stress, or substrate damage it dominates and
    produces paranoid ideation directed at specific animated agents. This is distinct from
    MECH-222 (where z_world itself is contaminated by self-predictions, producing diffuse
    self-referential reading of the world), from MECH-065 (where external authority signals
    override internal model precision, producing general spoofing vulnerability), and from
    the hostile attribution bias described in MECH-102 notes (which is about violence-script
    activation under pathway-closure conditions). The animated attribution bias is a prior
    miscalibration; hostile attribution is a pathway-selection error. Clinical relevance:
    the bias may be the substrate of referential thinking specifically about people and
    animals (as opposed to objects) and may co-amplify both MECH-222 and MECH-065 failure
    modes by directing their effects toward specific animated targets.
  registered: "2026-04-11"

- id: INV-066
  title: "z_self subtraction (MECH-221) must precede any coherency-based control plane signal; coherency checks on contaminated z_world generate self-sealing false confirmations."
  claim_type: invariant
  subject: control_plane.pre_coherency_gate_ordering
  polarity: asserts
  status: active
  depends_on:
    - MECH-221
    - MECH-065
    - SD-005
  location: docs/invariants.md#inv-066
  notes: >
    The coherency / verisimilitude calculation (MECH-065 RC-conflict lane; broader
    coherency signalling motifs in the control plane) operates by comparing z_world
    against sensory observations. This comparison is only veridical if z_world contains
    exogenous information only -- i.e., if MECH-221 (z_self residualization) has already
    occurred. If self-generated predictions persist in z_world, coherency checks will
    find z_world consistent with self-predictions (true by construction) and generate
    false high-coherency signals. These signals propagate through the control plane as if
    genuine world confirmations, reinforcing the contamination rather than correcting it.
    This is a self-sealing failure: contamination produces coherency, and coherency
    suppresses the correction signal that would otherwise detect contamination. The
    invariant specifies the required processing order: MECH-221 residualization is a
    mandatory gate that z_world must pass through before entering any coherency or
    verisimilitude calculation. Violations are computationally undetectable from within
    the system -- no downstream coherency signal can identify that it is operating on
    contaminated z_world. The invariant cannot be enforced post-hoc; it is a pipeline
    ordering constraint. This has architectural implications for the control plane:
    as the verisimilitude coherency calculation is extended and refined, each new
    signalling motif that reads z_world must explicitly be placed downstream of the
    residualization gate.
  registered: "2026-04-11"

- id: Q-037
  title: "Are the three psychosis substrate failure modes (MECH-094 tag-loss, MECH-222 self-attribution overflow, MECH-065/MECH-223 precision/bias) experimentally dissociable in the REE substrate?"
  claim_type: open_question
  subject: pathology.psychosis_substrate_dissociability
  polarity: open
  status: open
  implementation_phase: v3
  depends_on:
    - MECH-094
    - MECH-222
    - MECH-065
    - MECH-223
    - INV-066
  notes: >
    Three mechanistically distinct psychosis substrates have been registered, each with
    a different structural locus and predicted clinical fingerprint:
    (1) MECH-094 tag-loss: hypothesis tag write gate fails during replay; post-commit
    channel opens during simulation; residue accumulates from simulated/replayed content.
    Locus: replay event boundary. Clinical fingerprint: PTSD flashback, intrusive vivid
    memory, affective weight of replay (feels real because post-commit somatic channel
    is open). Episodic.
    (2) MECH-222 self-attribution overflow: continuous z_self residualization absent;
    self-predicted content persists in z_world; coherency checks confirm contamination
    (INV-066 self-sealing). Locus: z_world construction pipeline. Clinical fingerprint:
    referential delusion, thought broadcasting, grandiosity with internally consistent
    delusional logic. Continuous.
    (3) MECH-065 precision-ratio miscalibration: RC-conflict threshold too low; external
    authority signals override internal model. Locus: RC-conflict lane threshold. Clinical
    fingerprint: paranoid ideation driven by specific external agents, ideas of reference
    toward external sources. Context-triggered (by high-salience external input).
    Additionally: MECH-223 animated agency overweighting bias amplifies (2) and (3) by
