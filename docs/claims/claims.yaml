# Thought ingestion 2026-04-12: verisimilitude formal variables + temporal coherence (Apr 9 thought)
- id: INV-067
  title: "V(t): Verisimilitude is the precision-weighted, phase-aligned, hierarchical correspondence between ascending sensory-constrained and descending model-based signals."
  claim_type: invariant
  subject: perception.verisimilitude_definition
  polarity: asserts
  status: candidate
  notes: >
    Formal definition of V(t), the core verisimilitude variable. Three irreducible components:
    (1) content agreement: C_i(t) = exp(-||a_i - d_i||^2 / sigma_i^2); (2) phase alignment:
    P_i(t) = (1 + cos(phi_a_i - phi_d_i)) / 2; (3) precision weighting: alpha_i(t).
    V(t) = sum_i [w_i * alpha_i * C_i * P_i] / sum_i [w_i * alpha_i].
    Where a_i = ascending sensory-constrained signal at level i, d_i = descending
    model-based prediction at level i, across the hierarchical latent space.
    Missing any one component collapses the variable: without content agreement = empty
    synchrony; without phase agreement = untimed match; without persistence = cannot
    ground self or planning.
    Operational definitions: Perception = high V(t), sustained high D_V, strong sensory
    precision. Imagination = phase-offset from sensory stream, low/segregated V(t).
    Hallucination (failure) = internal predictions invade sensory phase channel -> false
    high V(t) without external input.
    Prerequisite: INV-066 (z_self residualization must precede any verisimilitude
    calculation -- see INV-066 pre-coherency gate invariant).
    Extends and formalises: MECH-094 (hypothesis tag), MECH-089 (cross-frequency coupling),
    the Apr 7 phase-segregation intake (thought_intake_2026-04-07_phase_segregation_perception_imagination.md).
  registered: "2026-04-12"
  location: evidence/planning/thought_intake_2026-04-09_verisimilitude_ethics.md

- id: INV-068
  title: "Temporal depth D_V(t): system behaviour must depend on temporal persistence of verisimilitude coupling, not instantaneous V(t) alone."
  claim_type: invariant
  subject: perception.temporal_depth_verisimilitude
  polarity: asserts
  status: candidate
  depends_on:
    - INV-067
  notes: >
    D_V(t) = temporal integration of V(t), implemented as exponential moving average:
    D_V(t + dt) = lambda * D_V(t) + (1 - lambda) * V(t + dt).
    D_V is the persistence-of-coupling signal. It serves distinct functions from V(t):
    V(t) = current reality-coupling quality; D_V(t) = sustained existence of that coupling.
    D_V grounds: self-continuity (persistence of D_self), hippocampal trajectory evaluation
    (evaluate by predicted future D_V, not just goal attainment), action selection (avoid
    trajectories where D_V collapses), learning prioritisation.
    Failure modes keyed to D_V: reduced temporal depth -> derealisation, unstable self;
    false local coherence (high V(t), low long-term D_V) -> mania/delusion; fragmented
    coherence -> dissociation; pathological commitment (short-term coherence trap).
    Formally: J(pi) = sum_k gamma^k * V_hat_pi(t+k) for trajectory selection.
    D_V can be approximated as exponential smoothing for computational tractability.
    V(t) may be approximated via prediction error inverses, phase synchrony metrics,
    or hybrid signals.
  registered: "2026-04-12"
  location: evidence/planning/thought_intake_2026-04-09_verisimilitude_ethics.md

- id: INV-069
  title: "The self is defined as the dynamically sustained process maintaining high temporal-depth verisimilitude across time, not a static representation."
  claim_type: invariant
  subject: self.coherence_trajectory_definition
  polarity: asserts
  status: candidate
  depends_on:
    - INV-067
    - INV-068
  notes: >
    Self = trajectory maintaining high D_self(t) -- the persistence of coherent self-tagged
    coupling across time. Not a static identity label, not a fixed latent vector.
    Formally: V_self(t) = sum_{i in S_self} [w_i * alpha_i * C_i * P_i] /
    sum_{i in S_self} [w_i * alpha_i], where S_self = subset of latent variables
    tagged as self-relevant.
    D_self(t + dt) = lambda * D_self(t) + (1 - lambda) * V_self(t + dt).
    Disruption -> fragmentation, dissociation, or instability of self-representation.
    Aligns with philosophical continuity accounts but is mechanistically specified.
    Self-continuity corresponds to persistence of temporal-depth coherence -- a dynamical
    systems stability property, not a labelling convention.
    Implication for architecture: self-model is not a stored object but an ongoing
    process that must be actively maintained by the TCL (ARC-053).
  registered: "2026-04-12"
  location: evidence/planning/thought_intake_2026-04-09_verisimilitude_ethics.md

- id: INV-070
  title: "Epistemic responsibility: agent is responsible for refining world models toward accurate similarity and threat inference; misclassification is morally relevant, not merely practically inconvenient."
  claim_type: invariant
  subject: ethics.epistemic_responsibility
  polarity: asserts
  status: candidate
  depends_on:
    - INV-025
    - INV-028
  notes: >
    The 10th-axiom extension of the five-axiom ethical foundation (INV-025-029).
    Axiom 3 (INV-025) establishes that action is model-mediated but does not constrain
    the agent to improve inference or treat misclassification as morally important.
    Without this invariant, an agent could claim "I acted under my model, therefore
    my violence was justified" -- the epistemically irresponsible actor loophole.
    INV-070 closes this loophole: because I act under models, I am responsible for
    refining those models so that similarity and threat are inferred as accurately as
    possible. Errors in world-modelling are ethically relevant failures.
    Consequences: hallucinated threats (psychosis-driven violence), propaganda-distorted
