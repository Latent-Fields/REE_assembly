- id: MECH-025
  title: "Action mode prioritizes short-horizon, high-precision, responsibility-linked control."
  claim_type: mechanism_hypothesis
  subject: cognitive_modes.action_doing
  polarity: asserts
  status: candidate
  v3_pending: true
  v3_pending_reason: |
    Requires (1) dynamic E3 precision (same gap as Q-007) and (2) self-attribution via SD-003
    (agent must internally distinguish agent-caused vs environment-caused events, not read a
