    action-committed trajectory (beta-stabilised), with phase offsets and cross-frequency
    coupling separating them. This extends MECH-089 (CFC packages E1 updates for E3) to
    the full multiplexing scheme.
    Phase-channel assignments: gamma = local binding (E1 content); theta = sequencing /
    hippocampal rollout (E3-hippocampus loop); beta = stabilised action / commitment bias;
    delta = global state / mode.
    Shared neurons participate in multiple streams, disambiguated by phase-of-firing
    relative to oscillatory carriers. This gives a natural multiplexing scheme without
    needing separate circuits for perception and imagination.
    Phase separation maintenance (maintained = imagination; collapsed = perception /
    "this is happening"). Collapse of phase separation = hallucination-like phenomena.
    Ephaptic coupling (MECH-228) is one physical substrate that helps enforce or bias
    phase separation.
