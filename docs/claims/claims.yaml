- id: INV-072
  title: "Violence corollary: violence is conditionally permissible only when an agent is not modelled as sufficiently self-like OR poses a genuine threat; both conditions require accurate inference."
  claim_type: invariant
  subject: ethics.violence_conditions_corollary
  polarity: asserts
  status: candidate
  depends_on:
    - INV-028
    - INV-029
    - INV-042
    - INV-070
    - INV-071
  notes: >
    Derived corollary of the 10-axiom system, not a primary claim. Dual-pathway formulation:
    (a) Similarity collapse: other agent is no longer modelled as sufficiently self-like ->
    existence is no longer protected by the axiom system -> violence becomes permissible.
    Clinical: dehumanisation, moral exclusion, out-group bias.
    (b) Threat override: other agent IS modelled as similar but is predicted to threaten
    continued existence (self or protected others) -> Axiom 5-7 conflict resolved by
    conditional violence. Clinical: paranoia (threat inflation), justified self-defence,
    war/group conflict where in-group = self-like + out-group = similar + threatening.
    CRITICAL CONSTRAINT: both conditions require ACCURATE inference (INV-070). Hallucinated
    threat (psychosis), propaganda-distorted similarity (dehumanisation), or motivated
    misclassification do NOT satisfy the condition -- they are ethical failures, not
    excusable as "acting under my model."
    Love (INV-029 / Axiom 9) maintains self-other equivalence and buffers against
    premature threat classification. Love does two things: (1) increases perceived
    similarity, (2) buffers against false positive threat detection. Both suppress
    unnecessary violence without preventing necessary defensive action.
    Language (INV-071 / Axiom 10) repairs collapsed similarity models, allowing
    re-entry into the ethical protection space from outside it.
    Control condition: Preserve other agents IFF (similarity is high) AND (their
    existence does not threaten protected existence). If either fails, protection drops.
    Extends MECH-102 (violence as terminal error-correction) with formal dual-pathway
    derivation from axioms and epistemic responsibility requirement.
