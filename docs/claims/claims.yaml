- id: MECH-231
  title: "E2 operates as a short-horizon efference-copy forward model on z_self; its prediction accuracy degrades faster than E1's across multi-step horizons, consistent with a cerebellar 1-step transition predictor."
  claim_type: mechanism_hypothesis
  subject: latent_stack.e2_short_horizon_efference_copy
  polarity: asserts
  status: provisional
  registered: "2026-04-13"
  supersedes: MECH-070
  depends_on:
    - ARC-021
    - MECH-069
    - MECH-033
    - ARC-018
    - SD-005
  location: docs/architecture/three_loop_learning_channels.md#mech-231
  source:
    - docs/architecture/three_loop_learning_channels.md
    - docs/thoughts/2026-03-14_three_bg_systems_error_signals.md
  notes: >
    Corrected reformulation of MECH-070. MECH-070 incorrectly asserted E2's planning
    horizon exceeds E1's; converging experimental (EXQ-132 FAIL, EXQ-212 FAIL 2/4) and
    literature evidence (Wolpert et al. 1998, Zago et al. 2021, Popa et al. 2017) showed
    the opposite: E2 degrades faster across prediction horizons than E1, and the
    biological cerebellar forward model is a short-horizon 1-step device bounded to
    sub-second timescales.
    Neurological mapping: E2 = cerebellar (fast efference-copy, z_self domain, training
    horizon=1-step MSE on z_self). E1 = cortical (slow LSTM, z_world domain,
    prediction_horizon=20 -- the longer horizon system). This is the Wolpert/Kawato
    framework: cerebellum provides fast, local motor-sensory forward prediction; cortex
    provides slow, multi-step world modeling.
    The rollout_horizon=30 for E2 in planning is a design parameter (how far E3
    simulates), separate from E2's training horizon (1-step). Rollout quality degrades
    quickly because E2 is only accurate for 1-step prediction -- this is expected and
    consistent with this claim.
    Key architectural consequence: for E2 to contribute to multi-step planning, E1 must
    co-evolve z_world during rollout (see MECH-135) -- E2 alone cannot sustain coherent
    multi-step trajectories.
    Experimental test: discriminative pair. E2 prediction R2 vs E1 prediction R2 across
    horizons h=1,3,5,10. Pass criterion: slope_e2 < slope_e1 (E2 degrades faster),
    and r2_e2_h1 > r2_e2_h10 by a significant margin (E2 is accurate at 1-step, not
    at 10-step). This is the inverse of MECH-070's criteria -- EXQ-212's C1 PASS
    (E2 better than E1 at h=1) is proto-evidence for this claim; the C2 FAIL for
    MECH-070 becomes a PASS criterion for MECH-231. New experiment needed to confirm
    under conditions where both models are adequately trained.
  evidence_quality_note: >
    Governance 2026-04-13: EXQ-407 dry run PASS (preliminary support). First direct
    experimental evidence: slope_e2=-5387 vs slope_e1=-31 (174x steeper E2 degradation),
    e2_r2_h1=-18 vs e1_r2_h1=-43 (E2 better single-step), consistent all 3 seeds. Signal
    is structural and replicates without full model convergence. Dry-run caveat: only 3
    warmup/eval episodes. Classified as preliminary support pending full run.
    Proto-evidence from MECH-070: EXQ-212 C1 PASS (E2 r2_h1=-19 vs E1 r2_h1=-43)
    consistent with this direction. Literature (Wolpert 1998, Zago 2021, Popa 2017)
    provides biological plausibility; literature entries for MECH-231 directly queued
    in 2026-04-13 lit-pull session.
    Governance 2026-04-14: EXQ-407 FULL RUN PASS (3 seeds, all 4 criteria). slope_e2=-4095
    vs slope_e1=-25 (164x ratio). e2_r2_h1=-19 vs e1_r2_h1=-45 (E2 better at h=1);
    e2_r2_h10=-19063 vs e1_r2_h10=-377 (E2 catastrophically worse at h=10). Consistent
    across seeds 42, 7, 123. Full-run confirmation of dry-run result. Promoted to
    provisional (governance-2026-04-14). conf=0.809, 5 supports / 0 weakens.

- id: MECH-232
  title: "Dopaminergic modulation of hippocampal place coding at reward-associated locations produces representational expansion (higher information density, finer spatial resolution, more stable place fields), and this expansion -- not an explicit positive valence gradient -- is the mechanism by which approach valence enters hippocampal terrain."
  claim_type: mechanism_hypothesis
  subject: hippocampus.da_representational_expansion
  polarity: asserts
  status: candidate
  registered: "2026-04-14"
  depends_on:
    - ARC-007
    - SD-004
    - MECH-229
  location: docs/architecture/hippocampal_valence_asymmetry.md#mech-232
  notes: >
    Derived from literature review of VTA-hippocampal dopaminergic pathway (2026-04-14).
    Key evidence: Retailleau & Morris 2018 showed local D1 blockade prevents place cell
    reorientation to reward-relevant features AND causes behavioral perseveration.
    Lisman & Grace 2005 proposed the hippocampal-VTA loop where DA enhances LTP at
    reward-associated locations. Wittmann 2005 provided human fMRI confirmation.
    The mechanism is: dopamine does not add a positive valence tag to hippocampal
    representations. Instead, it enhances the fidelity, stability, and associative
    richness of place representations at reward-relevant locations. The approach
    gradient is implicit in representational quality -- reward locations have more
    detailed, more durable, more easily reactivated maps. This is fundamentally
    different from the BLA pathway for threat, which writes explicit valence tags.
    Testable prediction: in the V3 hippocampal module, DA-modulated representational
    resolution at reward locations should produce approach behavior without requiring
    an explicit positive gradient field.

- id: MECH-233
  title: "Threat and approach valence enter hippocampal terrain through mechanistically asymmetric pathways: BLA writes explicit negative valence via dedicated anxiety/avoidance cells (Jimenez 2018); VTA-DA enhances representational fidelity via LTP modulation and place field sharpening (Retailleau & Morris 2018). The behavioural outputs (avoidance, approach) appear similar but the encoding mechanisms are distinct."
  claim_type: mechanism_hypothesis
  subject: hippocampus.valence_encoding_asymmetry
  polarity: asserts
  status: candidate
  registered: "2026-04-14"
  depends_on:
    - ARC-007
    - MECH-232
    - MECH-229
  location: docs/architecture/hippocampal_valence_asymmetry.md#mech-233
  notes: >
    Derived from literature review of BLA vs VTA hippocampal pathways (2026-04-14).
    The asymmetry: (1) Threat valence is encoded via dedicated valence-coding cells
    in ventral CA1 that project to LHA (Jimenez 2018). These are NOT place cells --
    they encode emotional context. The BLA pathway writes explicit avoidance tags
    that cannot be switched (Redondo 2014 showed BLA engrams resist valence reversal).
    (2) Approach valence is encoded via dopaminergic modulation of place cell fidelity
    in the hippocampal-VTA loop. No equivalent "reward cells" or "wanting cells" have
    been found in hippocampus (Jimenez 2018 explicitly notes this absence).
    Architectural implication for REE: the harm residue field (explicit negative
    valence in hippocampal terrain) is biologically accurate and maps directly to
    the BLA pathway. But a symmetric "wanting gradient" would be biologically
    inaccurate -- the approach side works through a fundamentally different mechanism.
    Testable prediction: ablating DA modulation of hippocampal resolution should
    degrade approach behavior while leaving avoidance intact; ablating explicit
    valence tags should degrade avoidance while leaving approach intact.

- id: ARC-057
  title: "Approach behavior toward reward locations emerges from the interaction of DA-mediated representational expansion (MECH-232) and an information-seeking (curiosity) drive operating on the hippocampal map. No explicit approach gradient or wanting field is required in hippocampal terrain."
  claim_type: architectural_commitment
  subject: hippocampus.curiosity_approach_emergence
  polarity: asserts
  status: candidate
  registered: "2026-04-14"
  depends_on:
    - MECH-232
    - ARC-007
    - SD-004
  location: docs/architecture/hippocampal_valence_asymmetry.md#arc-057
  notes: >
    Key architectural insight from 2026-04-14 session. The curiosity/exploration drive
    seeks information gain (novel or unexplored representational structure). DA-enhanced
    representational expansion at reward locations creates MORE navigable structure at
    those locations -- higher information density, more fine-grained distinctions, more
    associative connections. The curiosity drive naturally follows available structure,
    producing approach behavior as an emergent property rather than a commanded gradient.
    The analogy: the agent does the same thing everywhere (explores available map
    structure), but "available" is asymmetric because dopamine shaped the map. An
    observer sees preferential navigation toward reward locations and infers an
    attractive gradient, but there is no gradient -- there is more map.
    Contrast with threat: BLA-tagged threat locations do not expand the map. They
    are tagged with explicit avoidance valence, possibly with compressed representation
    (fast detection, not fine detail). The curiosity drive encounters a wall, not more
    space.
    Sub-predictions: (1) DA re-sharpening on each reward encounter maintains the
    representational expansion, keeping reward locations perpetually richer (wanting-
    as-maintenance). (2) Already-expanded representations encode incoming resource
    gradients at higher fidelity, enabling earlier detection from further away
    (wanting-as-sensitivity). (3) When reward contingency ends and DA modulation
    ceases, representational expansion decays and approach behavior extinguishes --
    not because a gradient is removed but because the expansion is no longer maintained.
    Testable: ablate DA modulation of hippocampal resolution while preserving the
    curiosity drive. Approach behavior should degrade. Restore DA modulation while
    ablating curiosity drive. Approach behavior should also degrade (both components
    necessary). Neither alone sufficient.
    SUBSTRATE CONSTRAINT (2026-04-14): this mechanism requires an environment where
    representational expansion at a location captures genuinely additional information
    -- not just the same sparse features at higher fidelity. In a grid world, a cell
    is a cell; there is nothing more to discover at higher resolution. The real world
    has near-fractal complexity where zooming in reveals more structure. The current
    CausalGridWorld cannot test ARC-057 faithfully. Testing the approach side requires
    either a richer environment with location-dependent feature complexity or a
    conceptual/mind-map space with variable information density. The threat/avoidance
    side (harm residue field, explicit tagging) remains testable in the grid world
    because tagging does not depend on environmental richness.

- id: MECH-234
  title: "DMS (goal-directed) and DLS (habitual) corticostriatal circuits can produce simultaneous parallel motor outputs only when targeting anatomically distinct motor effector pools; within the same effector pool, habitual and goal-directed outputs compete via winner-takes-all basal ganglia selection, not independent parallel expression."
  claim_type: mechanism_hypothesis
  subject: control_plane.habitual_deliberate_effector_domain_parallelism
  polarity: asserts
  status: candidate
  registered: "2026-04-15"
  depends_on:
    - MECH-090
    - ARC-021
  location: docs/architecture/control_plane_heartbeat.md#mech-234
  literature_evidence: |
    Redgrave et al. (2010) Nat Rev Neurosci [DOI: 10.1038/nrn2915]:
    Anatomically segregated DMS (associative/goal-directed) and DLS (sensorimotor/
    habitual) corticostriatal circuits are explicitly described as capable of producing
    simultaneous parallel outputs in DIFFERENT motor domains. The driving-while-
    conversing example directly instantiates this: habitual steering (DLS) concurrent
    with goal-directed conversation (DMS). Both systems are always computing.
    Balleine & O'Doherty (2010) Neuropsychopharmacology [DOI: 10.1038/npp.2009.131]:
    Confirms parallel value computation; qualifies that MOTOR OUTPUT competition
    occurs at action-selection level -- both circuits compute but compete for final
    effector control within a shared pool. Cross-effector parallelism is genuine;
    same-effector parallelism is winner-takes-all competition.
  notes: >
    Derived from Layer 3 lit-pull (2026-04-15). Addresses whether a separate habitual/
    E1-direct channel should run in parallel with E3 deliberative commitment (MECH-090).
    The critical distinction is motor effector domain: DMS/DLS are simultaneously active
    computationally, but their motor outputs compete for the same effector pool. When
    habitual and deliberate outputs target different effectors (cross-domain), genuine
    parallel expression is possible and biologically grounded. When they target the same
    effector (same-domain), basal ganglia winner-takes-all selection forces competition.

    REE DESIGN IMPLICATION: In a single-action-dimension substrate (CausalGridWorld),
    all outputs compete for the same action channel. MECH-090 BetaGate correctly models
    same-effector suppression of the habitual channel during commitment. Layer 3 (an
    independent hardware-level parallel habitual channel) is not warranted for same-domain
    motor competition -- it would misrepresent the winner-takes-all biology. Layer 1
    (trajectory stepping through committed plan) + Layer 2 (urgency interrupt via
    MECH-235 arbitration shift) are the correct implementation. Layer 3 parallelism
    DOES apply if and when REE is extended to multi-effector environments where different
    motor pools can be simultaneously commanded.

    The user's intuition that "habitual behaviors continue during planned execution" is
    biologically valid for CROSS-DOMAIN behaviors (a committed agent can habitably
    maintain posture, breathing rhythm, hand orientation while deliberating arm trajectory)
    but not for SAME-DOMAIN behaviors (a committed arm trajectory suppresses habitual arm
    reflexes via BG winner-takes-all -- a fact exploited by skilled motor training).
    Spinal withdrawal reflexes remain active (cross-domain: spinal cord level, not BG),
    which is a different circuit level than the BG gate MECH-090 models.

- id: MECH-235
  title: "vmPFC arbitration continuously weights model-based (E3/deliberative) vs. model-free (E1/habitual) contributions to action selection on a spectrum, not a binary switch. Commitment (beta-elevated E3) shifts weighting toward model-based without silencing the habitual channel; unexpected threat (urgency signal) shifts weighting toward model-free. The MECH-091 urgency interrupt is the substrate implementation of this arbitration shift, not a bypass of the beta gate."
  claim_type: mechanism_hypothesis
  subject: control_plane.vmpfc_arbitration_commitment_urgency
  polarity: asserts
  status: candidate
  registered: "2026-04-15"
  depends_on:
    - MECH-090
    - MECH-091
    - ARC-021
  location: docs/architecture/control_plane_heartbeat.md#mech-235
  literature_evidence: |
    Dolan & Dayan (2013) Neuron [DOI: 10.1016/j.neuron.2013.09.007]:
    Describes model-based and model-free systems as occupying a spectrum rather than
    discrete on/off states, with vmPFC continuously weighting their contributions.
    E3 commitment (elevated beta, model-based dominance) shifts the arbitration against
    habitual output -- habitual signals are downweighted, not independently maintained.
    The arbitration is dynamic and responsive to urgency signals. Uncertainty and
    prediction errors (unexpected harm) shift weighting toward model-free (faster,
    reactive), which is the mechanism by which the urgency interrupt works.
  notes: >
    Derived from Layer 3 lit-pull (2026-04-15). Provides biological grounding for the
    MECH-091 urgency interrupt implementation (Layer 2, urgency_interrupt_threshold in
    E3Config, implemented 2026-04-15).

    The urgency interrupt (beta_gate.release() when z_harm_a.norm() > threshold) is not
    a simple veto of the commitment gate. Biologically, it is a vmPFC arbitration shift:
    unexpected threat signals (prediction errors for harm -- z_harm_a in REE) increase
    model-free weighting in vmPFC, causing the balance to tip away from the committed
    deliberative plan toward habitual/reactive outputs. The beta gate release is the
    downstream consequence of this arbitration shift, not the mechanism itself.

    CLINICAL PREDICTION: The urgency_interrupt_threshold (default 0.8) maps onto
    individual differences in model-based vs. model-free balance under stress. Agents
    with low threshold are analogous to anxious individuals who cannot maintain
    goal-directed plans under mild threat -- they shift to reactive/habitual outputs
    prematurely. Agents with high threshold are analogous to highly trained responders
    who maintain task focus under significant threat. This is a testable axis for
    V3 experiments and connects to MECH-090 commitment robustness.

    ARCHITECTURAL BOUNDARY: MECH-235 applies at the level of the BG/vmPFC arbitration
    circuit (E3 commitment vs. E1 habitual). It does not apply at the spinal cord level
    (MECH-234 note: spinal withdrawal reflexes are below this arbitration and remain
    active independently). Within the BG circuit, the spectrum weighting means that
    urgency does not reset to pure model-free -- it shifts weighting, with the degree
    proportional to z_harm_a magnitude. The current threshold implementation
    (hard interrupt above 0.8) is a simplification; a future implementation could
    modulate action weighting continuously by urgency magnitude.

# ─── Hippocampal architecture claims: MECH-236 through MECH-243 ───────────────
# Derived 2026-04-15 from lit-pull on MECH-230 (z_goal latent structure) and
# MECH-155 (spatial as general associative indexing).
# MECH-236 through MECH-239: necessary for function.
# MECH-240 through MECH-243: improvement-tier — system can navigate goals without
# these; they target efficiency, generalization, and output fidelity. Flagged for
# later implementation (implementation_phase: v4).

- id: MECH-236
  title: "Hippocampal trajectory proposals must be conditioned on a goal signal (z_goal) injected from E3 via a dedicated input channel; without this conditioning, the hippocampal module generates only position-based trajectories and cannot produce goal-directed navigation toward target states."
  claim_type: mechanism_hypothesis
  subject: hippocampus.e3_goal_conditioning
  polarity: asserts
  status: candidate
  registered: "2026-04-15"
  implementation_phase: v3
  depends_on:
    - MECH-230
    - ARC-007
    - SD-004
  literature_evidence: |
    Ito et al. (2015) Nature [DOI: 10.1038/nature14396]:
    mPFC input via nucleus reuniens is causally required for trajectory-dependent
    CA1 firing during goal-directed navigation in rodents. When the prefrontal goal
    signal is disconnected, CA1 activity becomes position-encoding only and loses
    its trajectory-dependent (goal-conditioned) component. Direct causal evidence
    that a prefrontal-analogue goal signal is the mechanism that makes hippocampal
    activity goal-directed rather than purely positional. Maps onto the E3→hippocampal
    module wiring requirement for REE: z_goal must be read by the hippocampal module
    during trajectory generation, not only encoded within E3.
    Lit entry: targeted_review_mech_230/entries/2026-04-15_mech_230_prefrontal_hippocampal_goal_navigation_ito2015/
  notes: >
    MECH-230 establishes that z_goal exists as a structured latent attractor in E3.
    MECH-236 is the coupling claim: z_goal must be injected into the hippocampal
    trajectory proposal mechanism, not just maintained in E3. Without this wiring,
    MECH-230 can pass (z_goal has non-zero norm and structure) while hippocampal
    navigation remains undirected -- the map exists, the goal is encoded, but the
    navigator is not told where to go.

    TESTABLE PREDICTION: ablate the E3→hippocampal goal input while preserving E3
    goal encoding (MECH-230 intact). Trajectory proposals should degrade to
    position-based random walks; C3 goal-terrain navigation metric should fall to
    chance. Restore the input: navigation should recover proportional to z_goal_norm.

    IMPLEMENTATION NOTE: the goal-conditioning channel is distinct from the
    hippocampal viability map (residue field). The viability map tells the hippocampus
    where harm is; the goal signal tells it where to go. Both are required for
    avoid-harm-while-navigating-to-goal behavior.

- id: MECH-237
  title: "The z_goal attractor must be globally reachable across the z_goal sub-space — accessible from arbitrary latent starting states — not merely locally stable at a narrow basin; a locally-only-stable attractor fails to seed goal-directed hippocampal navigation from states far from the goal, producing approach behavior only when already near the goal."
  claim_type: mechanism_hypothesis
  subject: drive.goal_attractor_global_reachability
  polarity: asserts
  status: candidate
  registered: "2026-04-15"
  implementation_phase: v3
  depends_on:
    - MECH-230
    - SD-012
  literature_evidence: |
    Naude et al. (2024) Nature Communications [DOI: 10.1038/s41467-024-53976-x]:
    Computational model (MAGNet) plus optogenetic validation in mice showing that
    dopamine-mediated synaptic plasticity widens goal attractor basins in recurrent
    networks. Without the motivational dopamine signal, the goal attractor exists but
    is locally stable only -- accessible from nearby states but not globally. With
    the signal, the basin is expanded so the attractor pulls from across the latent
    space. Maps directly onto why SD-012 homeostatic drive is gating MECH-230:
    the substrate for z_goal may exist, but without drive the attractor is too narrow
    for goal-directed navigation from arbitrary starting states.
    Lit entry: targeted_review_mech_230/entries/2026-04-15_mech_230_goal_latent_attractor_naude2024/
  notes: >
    Refinement of MECH-230. MECH-230 requires z_goal_norm > 0 (attractor exists and
    is structured). MECH-237 adds the reachability requirement: the attractor must be
    accessible from the agent's current state, not only from nearby states. This is
    the difference between a goal representation that the hippocampus can use as a
    navigation target vs. one that only activates when the agent is already close.

    The EXQ-085 series failures (z_goal_norm < 0.1 across all conditions) are
    consistent with a locally-stable but globally inaccessible attractor: z_goal
    exists in principle but the SD-012 drive is not amplifying the basin sufficiently
    for the agent to reach it from the starting state distribution in the experiment.

    TESTABLE PREDICTION: with SD-012 drive active, z_goal_norm should be elevated
    not only near goal-proximal states but also from states sampled uniformly across
    the environment. A globally reachable attractor produces high z_goal_norm from
    all regions; a locally reachable one produces high z_goal_norm only near the goal.
    EXQ-328b is testing the existence arm (MECH-230); a follow-on experiment testing
    from diverse starting states would test MECH-237 specifically.

- id: MECH-238
  title: "The hippocampal module encodes pairwise distance relations between states in the z_world latent manifold — not only positional tags — providing a metric structure that enables distance-based navigation toward goal states across the residue-field terrain."
  claim_type: mechanism_hypothesis
  subject: hippocampus.distance_metric_encoding
  polarity: asserts
  status: candidate
  registered: "2026-04-15"
  implementation_phase: v3
  depends_on:
    - MECH-155
    - ARC-007
    - SD-005
  literature_evidence: |
    Theves, Fernandez & Doeller (2019) Current Biology [DOI: 10.1016/j.cub.2019.06.033]:
    After learning a novel 2D conceptual space (butterfly morphology features), the
    human hippocampus encodes Euclidean distances between abstract positions via both
    multivoxel pattern similarity and fMRI adaptation. This extends Constantinescu 2016
    from directional grid-like codes to full distance-metric encoding, confirming that
    hippocampal abstract-space coding is genuinely metric, not merely ordinal or
    directional. For REE: the residue-field terrain must be a metric space (knowing
    how far a state is from the goal, not just what state it is) for goal-directed
    trajectory proposals to be well-formed.
    Lit entry: targeted_review_connectome_mech_155/entries/2026-04-15_mech_155_feature_space_distances_theves2019/
  notes: >
    MECH-155 establishes that spatial navigation machinery generalises to abstract
    latent domains. MECH-238 adds the metric requirement: the generalised indexing
    substrate must encode distances, not just positions. The distinction matters for
    trajectory proposals: a lookup table (position → state) can retrieve any state
    given its tag, but only a metric map (state × state → distance) supports
    "navigate toward goal" as a well-defined operation.

    DESIGN CONSTRAINT: the hippocampal module's training objective must include a
    distance-preservation loss (or distance-respecting contrastive objective) over
    the z_world manifold, not only a reconstruction or classification objective.
    Without explicit metric supervision, the hippocampal representation may encode
    categorical structure (what state) but not metric structure (how far).

    RELATIONSHIP TO ARC-007 / SD-004: SD-004 proposes action objects as the
    hippocampal map backbone. MECH-238 says the backbone must be metric. These are
    compatible: action objects define the nodes; distances between nodes must be
    preserved in the representation.

- id: MECH-239
  title: "The hippocampal indexing substrate includes a temporal dimension implemented via time cells that tile elapsed time using the same phase-precession and theta-sequence machinery as place cells, enabling correct ordering of states within multi-step planning rollouts and working-memory sequences."
  claim_type: mechanism_hypothesis
  subject: hippocampus.temporal_indexing_time_cells
  polarity: asserts
  status: candidate
  registered: "2026-04-15"
  implementation_phase: v3
  depends_on:
    - MECH-155
    - MECH-089
    - ARC-032
  literature_evidence: |
    Banquet et al. (2020) Progress in Neurobiology:
    Comprehensive review establishing time cells as the fourth dimension of the
    hippocampal spatial indexing substrate. Time cells tile elapsed time as place
    cells tile spatial extent, using identical phase-precession and theta-sequence
    machinery. Temporal sequential replay occurs offline using the same mechanism
    as spatial replay. Directly addresses the working-memory-ordering and
    planning-rollout sequencing sub-claims of MECH-155: the same indexing substrate
    that handles spatial and abstract latent-domain traversal also handles temporal
    ordering, using one unified mechanism rather than a separate system.
    Lit entry: targeted_review_connectome_mech_155/entries/2026-04-15_mech_155_time_cells_temporal_index_banquet2020/
  notes: >
    MECH-089 (ThetaBuffer / cross-frequency packaging) establishes that theta
    oscillations implement sequential traversal. MECH-239 adds the hippocampal
    substrate specificity: time cells in hippocampus proper tile the temporal
    dimension using the same phase-precession mechanism as place cells, making the
    temporal index a first-class dimension of the hippocampal map rather than an
    add-on.

    CRITICAL FOR PLANNING ROLLOUT: multi-step trajectory proposals require the
    hippocampus to sequence states in correct temporal order, not just select states
    that are spatially/abstractly close to the goal. A hippocampal module without
    temporal indexing would produce trajectory fragments that are locally coherent
    but temporally unordered -- the correct states retrieved in the wrong sequence.

    RELATIONSHIP TO MECH-089: MECH-089 is the oscillatory mechanism (theta frequency
    as traversal clock); MECH-239 is the representational substrate (time cells as
    the indexed variable). Both are required: time cells without theta sequencing
    produce a static representation of elapsed time; theta sequencing without time
    cells has no temporal variable to sequence over.

    NOTE: offline temporal replay (consolidation during quiescence) also depends on
    time cells. This connects MECH-239 to INV-049 (offline consolidation necessity)
    and MECH-092 (SWR-equivalent replay during micro-DMN). Time cells are both a
    planning-rollout mechanism and a consolidation substrate.

# ─── Improvement-tier claims (implementation_phase: v4) ─────────────────────

- id: MECH-240
  title: "SD-012 homeostatic drive_level dynamically scales z_goal attractor basin width — high drive widens the basin so the goal attractor is globally accessible, low drive narrows it to local stability only — enabling motivational-state-dependent modulation of goal-directedness without permanently widening the basin."
  claim_type: mechanism_hypothesis
  subject: drive.goal_attractor_basin_scaling
  polarity: asserts
  status: candidate
  registered: "2026-04-15"
  implementation_phase: v4
  depends_on:
    - MECH-237
    - SD-012
  literature_evidence: |
    Naude et al. (2024) Nature Communications [DOI: 10.1038/s41467-024-53976-x]:
    MAGNet model plus optogenetic validation: motivational dopamine (drive signal)
    widens attractor basins dynamically. The widening is proportional to the
    motivational signal strength, not binary. Predicts that drive_level in REE
    should modulate z_goal attractor geometry continuously, not just gate the
    attractor's existence. An agent with high drive should navigate to goals from
    farther starting states than an agent with the same goal encoding but lower drive.
    Lit entry: targeted_review_mech_230/entries/2026-04-15_mech_230_goal_latent_attractor_naude2024/
  notes: >
    IMPROVEMENT-TIER CLAIM. The system can function with MECH-237 satisfied by a
    fixed wide attractor (always globally accessible). MECH-240 adds the motivational
    dynamics: basin width tracks drive_level, producing a tight, energy-efficient
    attractor at low drive that expands under high drive. This matters for behavioral
    flexibility (an agent with no current hunger should not be strongly pulled toward
    food locations) and metabolic efficiency (narrow basins are cheaper to maintain).

    PRIORITY: implement after MECH-237 is verified experimentally. MECH-240 requires
    a working globally-reachable attractor (MECH-237) before the dynamic scaling can
    be meaningfully tested. Implementing MECH-240 before MECH-237 risks conflating
    the two failure modes (attractor doesn't exist vs. attractor isn't drive-scaled).

    IMPLEMENTATION NOTE: in the SD-012 substrate, drive_weight already scales the
    goal contribution to action selection. MECH-240 proposes that drive_weight (or a
    related parameter) should additionally scale the attractor width in the z_goal
    representation itself -- a change to E3's goal encoding dynamics, not just to
    the action selection weighting.

- id: MECH-241
  title: "During active goal pursuit, hippocampal and OFC-analogue representations of goal-proximal states undergo compression -- goal locations cluster more tightly in neural state space -- improving signal-to-noise for goal-directed trajectory selection; the degree of compression predicts planning efficiency across episodes."
  claim_type: mechanism_hypothesis
  subject: hippocampus.goal_state_representational_compression
  polarity: asserts
  status: candidate
  registered: "2026-04-15"
  implementation_phase: v4
  depends_on:
    - MECH-236
    - MECH-238
    - MECH-230
  literature_evidence: |
    Muhle-Karbe et al. (2023) Neuron [DOI: 10.1016/j.neuron.2023.08.021]:
    During goal-seeking, hippocampal and OFC neural codes compress around goal
    locations -- goal states cluster together in neural state space. The degree of
    compression predicts learning success on the task. Compression is specifically
    goal-related (it does not affect non-goal locations equally) and emerges during
    active pursuit. For REE: goal-proximal states in z_world could be represented
    at higher density/lower noise during active goal pursuit, making the goal attractor
    sharper and the trajectory gradient cleaner.
    Lit entry: targeted_review_mech_230/entries/2026-04-15_mech_230_goal_seeking_hippocampus_ofc_muhlekarbe2023/
  notes: >
    IMPROVEMENT-TIER CLAIM. Goal-directed navigation works without representational
    compression (MECH-236 + MECH-237 + MECH-238 are sufficient for basic function).
    Compression is an efficiency gain: a tighter goal cluster produces a sharper
    gradient in the metric space, which translates to more reliable trajectory
    convergence, especially in environments with many distractors or long paths.

    RELATIONSHIP TO MECH-238: MECH-238 requires distance-metric encoding.
    MECH-241 says the metric geometry is not static -- it sharpens dynamically
    around current goals during active pursuit. The two are compatible: the metric
    space is always present, but its local geometry is goal-pursuit-modulated.

    INTERESTING QUESTION FOR GOVERNANCE: is compression a cause of efficient
    navigation (implement it to improve performance) or a consequence (it emerges
    when the system is working well)? The Muhle-Karbe finding is correlational
    (compression predicts success) rather than causal manipulation. Worth flagging
    as a candidate for V4 governance review rather than assuming the causal direction.

- id: MECH-242
  title: "Hippocampal trajectory construction operates via two dissociable mechanisms: (1) pattern completion for familiar trajectories (hippocampus-proper), and (2) vector-based construction for novel trajectories assembled from relational components (parahippocampal/parietal-analogue); pattern completion alone is sufficient for navigation within a learned residue field, but vector-based construction is required for generalisation to novel environments not represented in the existing map."
  claim_type: mechanism_hypothesis
  subject: hippocampus.dual_mode_trajectory_construction
  polarity: asserts
  status: candidate
  registered: "2026-04-15"
  implementation_phase: v4
  depends_on:
    - MECH-155
    - MECH-238
    - ARC-007
  literature_evidence: |
    Morton, Schlichting & Preston (2020) PNAS [DOI: 10.1073/pnas.1911338117]:
    Hippocampus and frontoparietal cortex form shared geometric representations of
    abstract relational event structure that support transitive inference (AC from
    AB+BC). Critically, the paper dissociates hippocampal pattern completion (familiar
    trajectory recall from partial cues) from parahippocampal/parietal vector-based
    retrieval (novel trajectory construction from relational components). Both
    mechanisms operate on the same abstract-space representation but via distinct
    circuits with different computational profiles.
    Lit entry: targeted_review_connectome_mech_155/entries/2026-04-15_mech_155_abstract_event_structure_morton2020/
  notes: >
    IMPROVEMENT-TIER CLAIM. V3 hippocampal experiments operate in a learned residue
    field -- the agent navigates a known environment. Pattern completion (mechanism 1)
    is sufficient for this: the hippocampus retrieves familiar trajectories from
    partial state cues. V3 does not require novel trajectory assembly from relational
    components.

    Vector-based construction (mechanism 2) becomes necessary when:
    (a) the agent must navigate to goals in environments not seen during training
    (zero-shot transfer), or (b) the agent must construct plans by combining
    sub-trajectories learned in separate contexts (compositional planning).
    Both are V4 requirements.

    ARCHITECTURAL IMPLICATION FOR V4: the parahippocampal/parietal-analogue circuit
    in REE would be a separate module from the hippocampal module proper. It would
    operate on the same z_world metric space (MECH-238) but via a different
    computational mechanism -- vector arithmetic over relational components rather
    than attractor-based pattern completion. The distinction tracks the ARC-021
    three-loop architecture: different loops may use different trajectory construction
    mechanisms appropriate to their planning horizons and environmental familiarity.

- id: MECH-243
  title: "A dedicated hippocampal output pathway (analogous to vCA1 to nucleus accumbens shell) specifically encodes approach bias during motivational conflict -- separately from harm avoidance -- cleanly dissociating the approach signal at the action-selection interface; inhibition of this pathway defaults action selection to avoidance without disrupting harm representation."
  claim_type: mechanism_hypothesis
  subject: hippocampus.approach_bias_output_pathway
  polarity: asserts
  status: candidate
  registered: "2026-04-15"
  implementation_phase: v4
  depends_on:
    - MECH-230
    - ARC-007
    - MECH-069
  literature_evidence: |
    Patterson et al. (2025) PLoS Biology [DOI: 10.1371/journal.pbio.3002722]:
    vCA1 to nucleus accumbens shell pathway specifically encodes approach bias during
    motivational conflict. Inhibiting this pathway produces avoidance default without
    affecting pure avoidance behavior or anxiety measures. The pathway is selective
    for approach signal during conflict, not for reward magnitude per se. Supports
    clean pathway-level dissociation between approach encoding and harm avoidance
    at the hippocampal output stage.
    Lit entry: targeted_review_mech_230/entries/2026-04-15_mech_230_vhpc_approach_avoidance_separation_patterson2025/
  notes: >
    IMPROVEMENT-TIER CLAIM. The system can navigate toward goals and avoid harm
    without a dedicated approach-bias output pathway (MECH-230 + MECH-236 + MECH-237
    are sufficient for goal-directed navigation; MECH-069 handles approach/avoidance
    incommensurability at the error signal level). MECH-243 is about output fidelity:
    a dedicated approach channel produces a cleaner approach signal at the
    action-selection interface, particularly during motivational conflict where
    approach and avoidance signals compete.

    RELATIONSHIP TO ARC-057: ARC-057 proposes approach behavior emerges from
    curiosity drive + DA-expanded hippocampal representation. MECH-243 is compatible
    with ARC-057: the dedicated output pathway could be the circuit through which the
    curiosity-driven approach signal reaches the action-selection interface, while
    a separate harm-avoidance pathway carries the conflict signal. ARC-057 explains
    why approach occurs; MECH-243 explains how the approach signal is transmitted
    cleanly to motor output.

    IMPLEMENTATION NOTE: in the current CausalGridWorld single-action-dimension
    substrate, approach and avoidance share the same action channel, making MECH-243
    difficult to test. This pathway dissociation becomes testable in a richer substrate
    where approach (move toward) and avoidance (move away) can be measured as
    independent output dimensions during simultaneous motivational conflict.
    Deferred to V4 accordingly.

# Registered 2026-04-16 -- psychiatric failure mode cluster (confabulation/psychosis/hallucination distinction)
# Source: clinician review of MECH-094 precision -- mechanistic disambiguation of tag-loss vs precision failure vs generative dominance
- id: MECH-244
  title: "Psychosis is a precision-weighting failure where prior beliefs persistently dominate sensory evidence; the generative model becomes self-sealing and sensory update is suppressed."
  claim_type: mechanism_hypothesis
  subject: psychiatric.psychosis_precision_weighting_failure
  polarity: asserts
  status: candidate
  claim_level: functional
  depends_on:
    - MECH-094
    - INV-011
  location: docs/architecture/default_mode.md
  source:
    - docs/architecture/default_mode.md
  notes: >
    Distinct from confabulation (MECH-094 simulation/real distinction failure). In
    confabulation, simulated content is written to the residue field as real because
    the source-monitoring and/or temporal context mechanisms fail -- the agent later
    "remembers" the simulation as real experience. In psychosis (this claim, MECH-244),
    the failure is upstream: the agent's current-moment generative predictions persistently
    outweigh sensory evidence, producing beliefs that contradict incoming percepts.
    Mechanistically: precision on sensory prediction errors (z_e1, z_e2 mismatch signals)
    is downregulated relative to prior-belief precision, so PE cannot correct the model.
    Clinical correlate: dopaminergic dysregulation of precision-weighting (Friston/Corlett
    active inference account; Adams et al. 2013, Corlett et al. 2009). In REE terms: the
    E1/E2 bottom-up error signal is discounted relative to the top-down prediction; the
    world model becomes unfalsifiable by experience. This is not source-monitoring failure
    -- the simulation/real distinction (MECH-094) may be intact -- but a failure of
    Bayesian updating from the environment.
    MECH-244 is one of three pathways to psychotic symptoms in the REE framework. All
    three are mechanistically distinct and therapeutically distinguishable:
    (A) MECH-244 (this claim): DA/NMDA precision-weighting failure -- prior beliefs
    dominate because the error signal is compromised. Strong evidence (Adams 2013,
    Corlett 2009). Responds to antipsychotics targeting DA/NMDA precision mechanisms.
    (B) MECH-246: Signal-degradation / pareidolia pathway -- sufficiently noisy or
    ambiguous bottom-up signals produce false percepts via correct Bayesian inference
    on degraded input, without formal precision failure. Early psychosis as-if quality,
    stimulant-induced distortions. May respond to perceptual/environmental intervention.
    (C) MECH-247: Trauma-shaped hypervigilant prior pathway -- pathological prior
    structure generates strong top-down predictions from minimal threat-relevant signals.
    Precision weighting may be intact; the Bayesian update is working correctly on
    pathological priors. Responds to trauma-focused therapy rather than (or in addition
    to) antipsychotics. Psychosis is likely multifactorial in both genesis and
    maintenance; individual patients may have contributions from all three pathways.
    Registered 2026-04-16: pathways B and C added based on clinical input from Daniel
    Golden (consultant psychiatrist); registered as MECH-246, MECH-247.

- id: MECH-245
  title: "Hallucination is a generative-model dominance failure where top-down predictions produce percepts without corresponding bottom-up sensory grounding."
  claim_type: mechanism_hypothesis
  subject: psychiatric.hallucination_generative_dominance
  polarity: asserts
  status: candidate
  claim_level: functional
  depends_on:
    - MECH-094
    - MECH-244
    - INV-011
  location: docs/architecture/default_mode.md
  source:
    - docs/architecture/default_mode.md
  notes: >
    Distinct from confabulation (MECH-094) and psychosis (MECH-244). Confabulation is a
    memory encoding failure (simulated content written as real). Psychosis is a belief
    updating failure (current beliefs resist sensory correction). Hallucination is a
    perceptual generation failure: the generative model (E1/E2 predictions) produces
    outputs in the sensory channels that are experienced as percepts, in the absence of
    corresponding environmental stimuli. In REE terms: E1 top-down predictions propagate
    forward as if they were received sensory signals, bypassing or overwhelming the
    bottom-up mismatch check. The agent perceives things that are not there. Clinical
    correlates: psychotic hallucinations (auditory verbal), hypnagogic hallucinations
    (sleep onset, generative model insufficiently suppressed -- see MECH-094 notes re
    REM), Charles Bonnet syndrome (deafferentation releasing generative prediction).
    Relationship to MECH-094: the simulation/real distinction (MECH-094) is NOT the
    primary protection against hallucination; that distinction governs write-through to
    phi(z), not percept generation. Hallucination prevention requires that bottom-up PE
    signals remain competitive with top-down predictions -- a precision balance issue
    (related to MECH-244) rather than a source-monitoring issue. However, hallucinations
    during REM may involve compound failure: MECH-094 notes that hallucinatory content
    during REM can accumulate in the residue field if the simulation/real mechanisms are
    compromised -- this is a confabulation+hallucination compound failure.

# Registered 2026-04-16 -- Papez circuit lit-pull discussion
# Source: clinical input from Daniel Golden (consultant psychiatrist) + discussion of
#         Adams 2013, Ffytche 2005, Corlett 2009 evidence limitations
- id: MECH-246
  title: "Psychotic-like symptoms can arise from signal-degradation pareidolia: sufficiently noisy or ambiguous bottom-up perceptual signals allow correct Bayesian inference to produce false percepts, without requiring formal precision-weighting failure."
  claim_type: mechanism_hypothesis
  subject: psychiatric.pareidolia_signal_degradation_pathway
  polarity: asserts
  status: candidate
  claim_level: functional
  depends_on:
    - MECH-244
    - MECH-245
  location: docs/architecture/default_mode.md
  source:
    - docs/architecture/default_mode.md
  notes: >
    Distinct from MECH-244 (precision-weighting failure) and MECH-245 (generative model
    dominance from absent bottom-up input). In this pathway, the precision-weighting
    system is intact but the bottom-up signal is too degraded, sparse, or ambiguous to
    constrain Bayesian inference sufficiently. The generative model makes pattern-
    completion errors that happen to be wrong -- not because the model resists updating,
    but because the evidence is insufficient to correct strong priors. The agent is doing
    correct Bayesian inference on bad data. Clinical correlates: perceptual distortions
    under sleep deprivation, stimulant-induced psychosis without clear delusional
    structure, early psychosis with as-if quality before full conviction develops,
    sensory threshold alterations from intoxication or metabolic disturbance. This
    pathway predicts that symptoms should remit when signal quality is restored
    (sleep, sobriety, resolution of metabolic disturbance) and may not require
    antipsychotic precision correction. Distinguished from MECH-244 by preserved
    insight and signal-dependency of symptoms; distinguished from MECH-245 by the
    presence of bottom-up input (however degraded) rather than its absence. Pending
    targeted literature evidence (EVB-0137). Registered 2026-04-16 from clinical
    discussion with Daniel Golden (consultant psychiatrist).

- id: MECH-247
  title: "Trauma-shaped hypervigilant priors can generate psychotic-like symptoms by structuring top-down predictions to respond strongly to minimal threat-relevant signals, producing perceptual errors and false beliefs without primary precision-weighting dysregulation."
  claim_type: mechanism_hypothesis
  subject: psychiatric.trauma_prior_psychosis_pathway
  polarity: asserts
  status: candidate
  claim_level: functional
  depends_on:
    - MECH-094
    - MECH-244
    - MECH-245
    - MECH-076
  location: docs/architecture/default_mode.md
  source:
    - docs/architecture/default_mode.md
  notes: >
    Distinct from MECH-244 (precision-weighting failure) and MECH-246 (signal-
    degradation pareidolia). In this pathway, the prior distributions themselves are
    pathologically structured by traumatic experience: threat-relevant signals generate
    strong top-down predictions that trigger MECH-245-like generative dominance from
    minimal bottom-up evidence. Precision weighting may be intact -- the Bayesian update
    is working correctly on pathological priors shaped by past real harm. The terrain
    deformation mechanism (MECH-076) may be directly involved: accumulated residue from
    real trauma deforms phi(z) in ways that generate threat-organized priors for future
    perception and inference. Clinical correlates: trauma-organized paranoid ideation,
    pseudo-hallucinations in complex PTSD, psychotic symptoms organized around themes
    from real past threat experience, voice-hearing content organized around themes of
    abuse or threat. This pathway predicts that normalizing precision-weighting
    (antipsychotics) may be insufficient without also addressing the prior structure
    (trauma-focused therapy). Distinguishes psychosis arising from prior-shaping via
    real experience from psychosis arising from neurochemical precision dysregulation.
    The REE mechanism: real harm accumulated in phi(z) via MECH-076 creates terrain
    that generates expectation-congruent threat predictions even from minimal sensory
    input. Pending targeted literature evidence (EVB-0138). Registered 2026-04-16 from
    clinical discussion with Daniel Golden (consultant psychiatrist).

- id: MECH-248
  title: "Source monitoring (frontoparietal network; Johnson-Raye tradition) is a candidate biological implementation of the simulation/real distinction required by MECH-094 -- distinguishing internally generated from externally received content at the level of memory encoding and attribution."
  claim_type: mechanism_hypothesis
  subject: default_mode.source_monitoring_frontoparietal_implementation
  polarity: asserts
  status: candidate
  claim_level: implementation
  depends_on:
    - MECH-094
    - INV-011
    - INV-019
  location: docs/architecture/default_mode.md
  source:
    - docs/architecture/default_mode.md
  notes: >
    Johnson and Raye's source monitoring framework identifies a frontoparietal network
    responsible for distinguishing the origin of mental content: internally generated
    (imagination, planning, rehearsal) vs. externally received (perception). Source
    monitoring failure corresponds directly to MECH-094's functional failure: the agent
    cannot determine whether a memory trace was internally generated (should not update
    phi(z) as committed experience) or received externally (should). This is a more
    direct implementation candidate for MECH-094's functional requirement than the OFC
    temporal context filter (Schnider 2003), which addresses relevance-gating of real
    memories rather than the simulation/reality distinction per se. The prefrontal-
    parietal basis of reality monitoring is supported by imaging and lesion studies
    (Mitchell 2009, Simons et al. 2008); the precise mapping to REE's phi(z) write
    pathway requires targeted literature review. Corollary discharge and efference copy
    (Frith 1992, 2014) are related mechanisms for self/other attribution that may
    implement an analogous distinction at the motor prediction level. The REE
    architecture requires source monitoring to operate not just for motor content but for
    all internally generated trajectories, including imaginative simulation and
    hippocampal replay. Pending targeted literature evidence (EVB-0134). Registered
    2026-04-16 following identification of Schnider 2003 temporal/epistemic distinction
    gap in MECH-094 mapping.

- id: MECH-249
  title: "Acetylcholine/noradrenaline balance implements action-mode-specific hippocampal write profiles as a continuous neuromodulatory state variable, providing the biological substrate of mode-dependent memory encoding differences across deliberate action, habit, simulation, SWS, and REM states."
  claim_type: mechanism_hypothesis
  subject: default_mode.neuromodulatory_encoding_mode_profile
  polarity: asserts
  status: candidate
  claim_level: implementation
  depends_on:
    - MECH-094
    - MECH-030
    - MECH-121
    - MECH-122
  location: docs/architecture/default_mode.md
  source:
    - docs/architecture/default_mode.md
  notes: >
    Hippocampal encoding mode is continuously set by the ACh/NE neuromodulatory context
    rather than by a discrete categorical gate. High ACh + high NE (aroused, deliberate
    waking action) strongly enables encoding; low ACh + low NE (automatic/habitual
    action) reduces hippocampal dependence and engagement; high ACh + low aminergic
    tone (REM sleep) produces theta oscillations and reactivation without the aminergic
    modulation that supports reality monitoring (Hasselmo 1999, 2006; Hobson and
    Pace-Schott 2002). SWS consolidation operates in a distinct neuromodulatory register:
    low ACh, declining NE, delta dominance, SWR-mediated hippocampus-to-cortex transfer.
    These state differences are continuous and overlapping, not binary transitions. In
    REE terms, the write profile for each action mode is an emergent property of the
    neuromodulatory context, not a discrete tag applied to content. MECH-094's functional
    requirement (simulation content must not update phi(z) as real experience) is
    partially implemented by the neuromodulatory conditions that differ between deliberate
    waking encoding and simulation/REM states. The REM vulnerability identified in Hobson
    and Pace-Schott 2002 (aminergic withdrawal during REM removing one layer of
    multi-mechanism protection) is a direct prediction of this account: neuromodulatory
    write-protection is degraded during REM, making it the state most vulnerable to
    simulation/real confusion (MECH-094 compound failure). The architectural implication
    is that the write-profile is a graded, state-dependent property of the encoding
    context, not a switch that is either on or off. Pending targeted literature evidence
    (EVB-0135). Registered 2026-04-16 following identification of the action-mode
    write-profile gap and discussion of Hobson 2002 neuromodulatory findings.

- id: MECH-250
  title: "The end of exhalation (expiration phase) provides a hard, periodic release
    signal for committed motor programs via respiratory-motor coupling -- a breath-timed
    gate-release mechanism distinct from hippocampal completion (ARC-028) and urgency
    interrupt (MECH-091)."
  claim_type: mechanism_hypothesis
  subject: control_plane.respiratory_phase_gate_release
  polarity: asserts
  status: candidate
  claim_level: implementation
  depends_on:
    - MECH-090
    - MECH-108
    - ARC-028
    - MECH-091
  location: docs/architecture/control_plane_heartbeat.md
  source:
    - docs/architecture/control_plane_heartbeat.md
  notes: >
    Observed across species that planned motor actions are preferentially released at
    the end of exhalation: dogs time action initiation to a sharp outbreath; vocal
    production in humans is almost exclusively on expiration; skilled motor actions
    (e.g., throwing, striking) cluster at the exhale-end phase. The mechanism is
    respiratory-motor coupling: relaxation of the diaphragm and accessory respiratory
    muscles at end-expiration reduces core tension, providing a brief window of reduced
    postural load in which committed motor programs can propagate to effectors without
    fighting against the inspiratory drive. In REE terms this is a THIRD release
    pathway for the MECH-090 bistable beta gate (alongside hippocampal completion
    ARC-028 and urgency interrupt MECH-091): the expiratory phase-boundary fires a
    hard gate-release signal, briefly opening the policy-propagation channel regardless
    of hippocampal completion quality or harm escalation. Crucially, this is
    mechanistically distinct from MECH-108 (BreathOscillator), which already softens
    the commit threshold during the sweep phase to create periodic uncommitted windows.
    MECH-250 is not a threshold-softening effect but a positive release trigger: it
    actively drives beta_gate.release() at the exhale-end boundary, enabling biological
    breath-timed action initiation. The coupling also explains why the BreathOscillator
    sweep phase (MECH-108) and the gate release event (MECH-250) can be temporally
    coordinated: the sweep opens the evaluation window and the respiratory boundary
    fires the release, yielding breath-organised motor output. Implementation would
    extend BetaGate with receive_respiratory_phase(phase) -> release at EXHALE_END,
    driven by the MultiRateClock breath cycle state. Registered 2026-04-16 from
    empirical observation (dogs releasing planned actions with a sharp outbreathing)
    during MECH-090 bistable gate development.
