- id: ARC-016
  claim_type: architectural_commitment
  subject: cognitive_modes.control_plane_regimes
  polarity: asserts
  status: provisional
  evidence_quality_note: |
    V2 EXQ (precision_regime_probe, 2026-03-08): FAIL (partial_support=true, 1/2 criteria).
    Criterion 1 met: precision gap achieved (1.697, easily). Criterion 2 failed: behavioral
    distinction absent — HIGH_REGIME (commit_rate=1.0) and LOW_REGIME (commit_rate=0.0) produce
    identical harm (1.233 vs 1.218). Root cause: precision is externally imposed (not E3-derived),
    and the commitment-to-action circuit is not connected to harm outcomes in V2. Even with
    radically different commit rates, harm is identical — meaning commitment is not gating
    behavior in a way that matters for the outcome metric. Two V3 requirements exposed:
    (1) E3-derived dynamic precision calibrated from prediction error (not hardcoded 0.5);
    (2) commitment gating must actually change action-selection in a way that affects harm —
    the precision→commitment→behavior→harm circuit must be genuinely wired end-to-end.
    Note: MECH-059 (precision/PE structural separation) PASSED in V2, confirming the channels
    exist as distinct signals. ARC-016 is a stronger claim: that those channels produce
    behaviorally distinct operating modes. The structural separation is necessary but
    not sufficient for ARC-016.
  depends_on:
    - ARC-005
    - MECH-059
    - ARC-021
  location: docs/architecture/modes_of_cognition.md#arc-016
  source:
    - docs/thoughts/2026-02-08_modes_of_cognition_control_plane_regimes.md
