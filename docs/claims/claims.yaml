    The open question has two parts: (A) structural dissociability -- can each failure
    mode be induced selectively by targeted ablation while leaving the others intact?
    (B) phenotypic distinctness -- do the induced behavioral signatures match the
    predicted clinical fingerprints? A positive answer to both would provide strong
    mechanistic grounding for REE as a psychiatrically-predictive architecture. Answering
    this requires implementing all three mechanisms and designing ablation experiments
