- id: MECH-227
  title: "Anaesthesia as D_V collapse: general anaesthesia abolishes consciousness by disrupting phase alignment, degrading V(t) globally, and collapsing D_V to zero."
  claim_type: mechanism_hypothesis
  subject: pathology.anaesthesia_consciousness
  polarity: asserts
  status: candidate
  depends_on:
    - INV-067
    - INV-068
    - ARC-053
    - MECH-225
    - MECH-228
  notes: >
    Anaesthetics (propofol, sevoflurane, etc.) act via GABA-A potentiation, potassium
    channel effects, NMDA modulation -- all alter network excitability and synchrony.
    Mechanism in V(t)/D_V terms:
    (A) Reduced effective connectivity: ascending and descending signals fail to couple
    -> C_i(t) drops (content mismatch / ineffective propagation).
    (B) Phase disruption or over-synchronisation: desynchronisation (no coherent timing)
    OR excessive low-frequency synchrony (delta-dominance) -> P_i(t) becomes non-informative.
    (C) Collapse of hierarchical integration: high-level <-> low-level interaction weakens.
    Result: V(t) -> 0 globally, D_V -> 0 (coupling not sustained even transiently).
    Conscious experience requires sustained temporal-depth verisimilitude (INV-068);
    anaesthesia prevents the system from maintaining temporally extended coupling between
    its internal models and incoming signals.
    Additional mechanism: the similarity metric used in V(t) computation may itself be
    distorted under anaesthesia -- noise-dominated similarity (reduced differentiation),
    over-smoothing (loss of discriminability), or decoupled representation geometry
    (a_i and d_i live in effectively different spaces -> similarity function meaningless).
    So anaesthesia may degrade both the SIGNALS and the METRIC used to compare them.
    Clinical predictions: light sedation = reduced D_V, fluctuating V -> dreamy/unstable;
    deep anaesthesia = near-zero D_V -> no stable self or reportable experience; emergence
    = gradual restoration of phase structure and hierarchical coupling -> rising D_V
    before coherent cognition returns.
    Unifies: disrupted integration theories, thalamocortical breakdown, posterior hot zone
    instability -- all grounded in V(t)/D_V collapse mechanics.
    Loss of consciousness correlates with disrupted long-range cortical connectivity and
    altered oscillatory patterns (increased slow-wave activity) -- consistent with D_V collapse.
  registered: "2026-04-12"
  location: evidence/planning/thought_intake_2026-04-09_verisimilitude_ethics.md

- id: MECH-228
  title: "Field-level coherence support (ephaptic coupling): extracellular electric field interactions stabilise phase relationships across neural populations, supporting temporal coherence."
  claim_type: mechanism_hypothesis
  subject: architecture.ephaptic_coupling_coherence
  polarity: asserts
  status: candidate
  implementation_phase: v4
  depends_on:
    - ARC-053
    - MECH-225
  notes: >
    Ephaptic coupling = interaction between neurons via local extracellular electric
    fields (not synapses). Particularly prominent in tightly packed, synchronised
    structures: cortex, hippocampus, cerebellum.
    Function in V(t)/D_V framework: contributes to the physical substrate enforcing or
    biasing phase alignment across populations, supporting temporal coherence (ARC-053).
    Not the sole mechanism -- one contributor to the phase coherence scaffold alongside
    synaptic transmission, gap junctions (inferior olive, MECH-226), and oscillatory dynamics.
    Properties: fast (no synaptic delay), local but scalable through synchrony, strongest
    when neurons are aligned and oscillations are coherent. Ideal for stabilising the
    phase relationships needed for coupling -- reduces phase drift, promotes synchronisation,
    stabilises coupling windows.
    Updated P_i(t) formulation with ephaptic contribution:
    P_i(t) = f(delta_phi_i(t), local field coherence), where ephaptic effects reduce
    phase drift and promote synchronisation.
    Anaesthesia link: many anaesthetics change membrane conductance and extracellular
    ionic environment, reducing effective synchrony -> disrupt conditions under which
    ephaptic coupling meaningfully stabilises phase -> phase drift -> degraded P_i(t)
    -> V(t) collapse (MECH-227).
    Note: inferior olive uses gap junctions (not strictly ephaptic -- distinct mechanism
    but related category of field-level coupling). Distinguishing synaptic, gap junction,
    and ephaptic contributions remains active neuroscience research. All three contribute
    to phase coherence as complementary mechanisms.
    Role of ephaptic coupling in cognition-level segregation remains debated; role in
    synchrony is well-supported (Anastassiou & Koch 2015; Fries 2015 communication
    through coherence).
  registered: "2026-04-12"
  location: evidence/planning/thought_intake_2026-04-09_verisimilitude_ethics.md

