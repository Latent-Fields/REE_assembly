  location: evidence/planning/thought_intake_2026-04-09_verisimilitude_ethics.md

- id: ARC-053
  title: "Temporal Coherence Loop (TCL): architecture must include a distributed loop responsible for maintaining phase alignment and temporal synchrony necessary for V(t) to be computable."
  claim_type: arch_commitment
  subject: architecture.temporal_coherence_loop
  polarity: asserts
  status: candidate
  implementation_phase: v4
  depends_on:
    - INV-067
    - INV-068
    - MECH-089
  notes: >
    V(t) requires that ascending and descending signals meet in the same phase channel
    at the right moment. Without a temporal coherence mechanism, predictions and inputs
    miss each other in time, phase-coded multiplexing breaks, and V(t) becomes
    undefined regardless of content accuracy.
    The TCL is a distributed control loop (not a single module) that: (1) aligns phase
    relationships across subsystems, (2) adjusts timing windows and synchrony, (3) enables
    or prevents coupling between prediction and input, (4) modulates integration windows
    based on task demands and mode (wake, imagination, sleep).
    Failure modes: if TCL drifts -> misalignment -> weak coupling -> derealisation or
    low vividness. If TCL collapses or overcouples -> simulation enters sensory phase ->
    hallucination-like states.
    Biophysical substrate hypothesis: inferior olive + cerebellum + thalamus + cortical
    networks (MECH-226). The inferior olive's historically unclear function may be
    specifically understood as the phase reference generator enabling this loop.
    Inputs: prediction-input timing mismatch, phase coherence metrics, D_V trends.
    Outputs: phase adjustments, temporal integration window tuning, coupling thresholds.
    TCL must maintain conditions under which V(t) is computable as its primary constraint.
    Also required for: sleep-phase transitions (mode changes require TCL recalibration),
    anaesthesia accounts (MECH-227 = TCL disruption), and the pre-coherency gate (INV-066
    requires that residualization precedes TCL-enabled coherency checks).
  registered: "2026-04-12"
  location: evidence/planning/thought_intake_2026-04-09_verisimilitude_ethics.md

- id: ARC-054
  title: "D_V trajectory selection: E3 trajectory selection must optimise predicted temporal-depth verisimilitude D_V over planning horizon H, not instantaneous V(t) alone."
  claim_type: arch_commitment
  subject: architecture.dv_trajectory_selection
  polarity: asserts
  status: candidate
  implementation_phase: v4
  depends_on:
    - INV-068
    - ARC-053
  notes: >
    Hippocampal rollout evaluation criterion: trajectories are evaluated by predicted
    future D_V, not just goal attainment. Formally: J(pi) = sum_k gamma^k * V_hat_pi(t+k).
    E3 selection: pi* = argmax_pi J(pi) subject to survival and harm constraints.
    Viable futures = those maintaining coherent existence; non-viable futures = collapse
    of coherence.
    Optimising instantaneous V(t) alone is insufficient -- it creates short-term coherence
    traps (high local V, low long-term D_V -> mania/delusion failure mode).
    kappa_commit (commit threshold) = minimum predicted D_V required to commit to a
    trajectory. Long horizon H prioritises long-term stability over local coherence.
    This replaces simple reward maximisation with coherence-persistence maximisation,
    which is more general: reward becomes a special case of coherence preservation.
    The architecture naturally generalises: maximising D_V over long H corresponds
    to the ethical axioms (Axiom 5: preserve existence = avoid D_V collapse; Axiom 7:
    others' existence = extend D_V tracking).
  registered: "2026-04-12"
  location: evidence/planning/thought_intake_2026-04-09_verisimilitude_ethics.md

- id: ARC-055
  title: "Verisimilitude signal availability: V(t) and D_V must be explicitly available to E3 selection and influence E1/E2 learning updates."
