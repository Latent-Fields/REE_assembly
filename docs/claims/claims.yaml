    other-agent models), (2) negotiating threat (updating similarity/threat inference
    in real time), (3) repairing misclassification (correcting distorted self-other
    equivalence models), (4) restoring INV-028 (re-establishing belief that others are
    sufficiently self-like), (5) expanding the category of "sufficiently like me"
    (extending moral concern to previously excluded agents or groups).
    Language is a similarity-repair technology. This explains why storytelling, testimony,
    confession, and dialogue can reduce violence even when material conditions have not yet
    changed -- they operate directly on the self-other equivalence model that drives
    violence permissibility (INV-072 / MECH-102).
    Provides mechanistic grounding for: propaganda analysis (deliberate corruption of
    similarity inference via language), de-radicalisation (language-mediated repair of
    distorted models), testimony and truth-and-reconciliation processes.
    Connects to: predictive processing accounts of language as prior-updating, and to
